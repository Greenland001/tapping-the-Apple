<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Яблоко Кликер</title>

<style>
    body{
        margin:0;
        height:100vh;
        display:flex;
        flex-direction:column;
        justify-content:center;
        align-items:center;
        background:#111827;
        font-family:Arial, sans-serif;
        color:white;
    }

    #score{
        font-size:40px;
        margin-bottom:10px;
    }

    #critText{
        height:30px;
        font-size:22px;
        margin-bottom:10px;
        font-weight:bold;
        color:orange;
        opacity:0;
        transition:0.2s;
    }

    #apple{
        width:140px;
        height:140px;
        background:red;
        border-radius:50%;
        position:relative;
        cursor:pointer;
        margin-bottom:20px;
        box-shadow:0 0 20px rgba(255,0,0,0.5);
        transition:0.1s;
    }

    #apple:active{
        transform:scale(0.9);
    }

    #apple .stick{
        position:absolute;
        width:8px;
        height:25px;
        background:brown;
        top:-18px;
        left:66px;
        border-radius:10px;
    }

    #apple .leaf{
        position:absolute;
        width:35px;
        height:20px;
        background:green;
        top:-10px;
        left:78px;
        border-radius:50%;
        transform:rotate(30deg);
    }

    button{
        padding:10px 15px;
        border:none;
        border-radius:10px;
        cursor:pointer;
        margin:5px;
    }

    button:disabled{
        background:gray;
        cursor:not-allowed;
    }
</style>
</head>

<body>

<div id="score">Очки: 0</div>
<div id="critText">КРИТИЧЕСКИЙ УРОН</div>

<div id="apple">
    <div class="stick"></div>
    <div class="leaf"></div>
</div>

<div>
    <button id="upgrade">Улучшение (+урон) — 60</button>
</div>

<script>
let score = Number(localStorage.getItem("score")) || 0;
let damage = Number(localStorage.getItem("damage")) || 1;
let price = Number(localStorage.getItem("price")) || 60;
let stage = Number(localStorage.getItem("stage")) || 0;

const scoreText = document.getElementById("score");
const apple = document.getElementById("apple");
const shop = document.getElementById("upgrade");
const critText = document.getElementById("critText");

function save(){
    localStorage.setItem("score", score);
    localStorage.setItem("damage", damage);
    localStorage.setItem("price", price);
    localStorage.setItem("stage", stage);
}

function update(){
    scoreText.textContent = "Очки: " + score;

    shop.textContent = `Улучшение (+${damage}) — ${price}`;
}

function showCrit(){
    critText.style.opacity = 1;

    setTimeout(() => {
        critText.style.opacity = 0;
    }, 1000);
}

apple.onclick = () => {
    let gain = damage;

    if(Math.random() < 0.10){
        gain = 10;
        showCrit();
    }

    score += gain;
    save();
    update();
};

shop.onclick = () => {
    if(score >= price){
        score -= price;

        damage++;

        // после 25 урона рост становится быстрее
        let add = damage > 25 ? 1 : 2;

        price = Math.floor(price * 1.35 + add);

        stage++;

        save();
        update();
    }
};

update();
</script>

</body>
</html>
