<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>Apple Skins</title>

<style>
html, body{
    margin:0;
    height:100%;
    overflow:hidden;
    font-family:Arial;
    background:#151520;
    color:white;
}

.game{
    height:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
}

#apple{
    font-size:120px;
    cursor:pointer;
    user-select:none;
    transition:transform 0.1s, filter 0.3s;
    filter: drop-shadow(0 10px 10px rgba(0,0,0,0.5));
}

#apple.click{ transform:scale(0.92); }

.panel{
    background:#2c2c44;
    padding:10px;
    margin-top:10px;
    width:280px;
    border-radius:10px;
}

button{
    padding:8px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin-top:6px;
    width:100%;
}

#status{
    font-size:12px;
    opacity:0.7;
    margin-top:5px;
}

#fallSkin{
    position:fixed;
    top:-150px;
    left:50%;
    transform:translateX(-50%);
    font-size:90px;
    transition:top 0.8s ease;
    pointer-events:none;
    filter:drop-shadow(0 10px 10px rgba(0,0,0,0.5));
}

/* эффекты */
.greenGlow{ filter:drop-shadow(0 0 10px lime); }
.blackGlow{ filter:drop-shadow(0 0 10px purple) brightness(0.7); }
.goldGlow{ filter:drop-shadow(0 0 15px gold) brightness(1.4); }
</style>
</head>

<body>

<div id="fallSkin"></div>

<div class="game">

    <div id="apple">🍎</div>

    <div class="panel">
        <div>Очки: <span id="score">0</span></div>
    </div>

    <div class="panel">
        <div>Скины</div>

        <button onclick="buySkin('green')">🟢 Зелёное (1000)</button>
        <button onclick="buySkin('black')">🌙 Ночное (5000)</button>
        <button onclick="buySkin('gold')">🥇 Золотое (100000)</button>

        <div id="status">Белое — куплено</div>
    </div>

</div>

<script>
let score=0;

let owned={
    green:false,
    black:false,
    gold:false
};

let currentSkin="white";

const apple=document.getElementById("apple");
const scoreEl=document.getElementById("score");
const statusEl=document.getElementById("status");
const fallSkin=document.getElementById("fallSkin");

/* ================= SAVE ================= */
function save(){
    localStorage.setItem("score",score);
    localStorage.setItem("owned",JSON.stringify(owned));
    localStorage.setItem("skin",currentSkin);
}

function load(){
    let s=localStorage.getItem("score");
    let o=localStorage.getItem("owned");
    let sk=localStorage.getItem("skin");

    if(s) score=Number(s);
    if(o) owned=JSON.parse(o);
    if(sk) currentSkin=sk;

    applySkin(currentSkin);
}

function update(){
    scoreEl.textContent=score;
}

/* ================= FALL ANIMATION ================= */
function spawnSkinFall(emoji){
    fallSkin.innerText=emoji;
    fallSkin.style.top="-150px";

    setTimeout(()=>{
        fallSkin.style.top="40%";
    },50);

    setTimeout(()=>{
        fallSkin.style.top="-150px";
    },900);
}

/* ================= SKINS ================= */
function applySkin(skin){

    apple.className="";

    if(skin==="green"){
        apple.innerText="🍏";
        apple.classList.add("greenGlow");
        statusEl.innerText="Зелёное — куплено";
    }

    if(skin==="black"){
        apple.innerText="🍎";
        apple.classList.add("blackGlow");
        statusEl.innerText="Ночное — куплено";
    }

    if(skin==="gold"){
        apple.innerText="🍎";
        apple.classList.add("goldGlow");
        statusEl.innerText="Золотое — куплено";
    }

    if(skin==="white"){
        apple.innerText="🍎";
        statusEl.innerText="Белое — куплено";
    }

    currentSkin=skin;
    save();
}

/* ================= BUY ================= */
function buySkin(type){

    if(type==="green" && score>=1000){
        score-=1000;
        owned.green=true;

        spawnSkinFall("🍏"); // 👈 прилетает сверху
        setTimeout(()=>applySkin("green"),800);
    }

    if(type==="black" && score>=5000){
        score-=5000;
        owned.black=true;

        spawnSkinFall("🌙");
        setTimeout(()=>applySkin("black"),800);
    }

    if(type==="gold" && score>=100000){
        score-=100000;
        owned.gold=true;

        spawnSkinFall("🥇");
        setTimeout(()=>applySkin("gold"),800);
    }

    update();
    save();
}

/* ================= CLICK ================= */
apple.onclick=()=>{

    score+=1;
    update();
    save();
};

/* start */
load();
update();
</script>

</body>
</html>
