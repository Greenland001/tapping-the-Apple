<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <!-- Этот тег запрещает пользователю менять масштаб (зумить) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apple Clicker</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            /* Запрещаем выделение текста и прокрутку */
            user-select: none;
            overflow: hidden;
            touch-action: manipulation;
        }

        #score-container {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
        }

        #apple {
            width: 200px;
            cursor: pointer;
            transition: transform 0.05s;
            /* Предотвращает стандартные действия браузера при долгом нажатии */
            -webkit-tap-highlight-color: transparent;
        }

        #apple:active {
            transform: scale(0.9);
        }

        #shop {
            margin-top: 50px;
            padding: 20px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 250px;
        }

        .upgrade-btn {
            background-color: #4CAF50;
            border: none;
            color: white;
            padding: 15px;
            width: 100%;
            text-align: center;
            font-size: 16px;
            margin: 10px 0;
            cursor: pointer;
            border-radius: 8px;
            transition: background 0.3s;
            -webkit-tap-highlight-color: transparent;
        }

        .upgrade-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        .info {
            font-size: 14px;
            color: #666;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div id="score-container">Очки: <span id="score">0</span></div>
    
    <div id="apple" style="font-size: 150px; text-align: center;">🍎</div>

    <div id="shop">
        <h3>Магазин</h3>
        <button id="upgradeBtn" class="upgrade-btn">
            Улучшить клик (+1)
        </button>
        <div class="info">Цена: <span id="upgradeCost">10</span></div>
        <div class="info">Сила клика: <span id="clickPower">1</span></div>
    </div>

    <script>
        let score = 0;
        let clickPower = 1;
        let upgradeCost = 10;

        const scoreDisplay = document.getElementById('score');
        const apple = document.getElementById('apple');
        const upgradeBtn = document.getElementById('upgradeBtn');
        const upgradeCostDisplay = document.getElementById('upgradeCost');
        const clickPowerDisplay = document.getElementById('clickPower');

        function updateDisplay() {
            scoreDisplay.innerText = Math.floor(score);
            upgradeCostDisplay.innerText = upgradeCost;
            clickPowerDisplay.innerText = clickPower;
            upgradeBtn.disabled = score < upgradeCost;
        }

        apple.addEventListener('click', (e) => {
            // Предотвращаем стандартное поведение (на всякий случай)
            e.preventDefault();
            score += clickPower;
            updateDisplay();
        });

        upgradeBtn.addEventListener('click', () => {
            if (score >= upgradeCost) {
                score -= upgradeCost;
                clickPower += 1;
                upgradeCost = Math.round(upgradeCost * 1.6);
                updateDisplay();
            }
        });

        updateDisplay();
    </script>
</body>
</html>
