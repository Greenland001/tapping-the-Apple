<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>Apple Game</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    font-family: Arial;
    background: #1e1e2f;
    color: white;
}

.game {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
}

h1 { margin: 10px; }

#apple {
    font-size: 120px;
    cursor: pointer;
    user-select: none;
    transition: transform 0.08s;
}

#apple.click {
    transform: scale(0.9);
}

.panel {
    background: #2c2c44;
    padding: 10px;
    margin-top: 10px;
    width: 260px;
    border-radius: 10px;
}

button {
    padding: 8px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 5px;
}

#shopBtn {
    position: fixed;
    top: 10px;
    right: 10px;
    font-size: 24px;
    background: #2c2c44;
    border: none;
    border-radius: 8px;
    padding: 8px;
}

#shop {
    display: none;
}

.critText {
    position: absolute;
    color: orange;
    font-weight: bold;
    animation: fade 1s forwards;
    pointer-events: none;
}

@keyframes fade {
    0% {opacity: 1; transform: translateY(0);}
    100% {opacity: 0; transform: translateY(-40px);}
}

/* урон текст в разные стороны */
.dmgText {
    position: absolute;
    font-weight: bold;
    color: #66ffcc;
    animation: dmgAnim 0.6s forwards;
    pointer-events: none;
}

@keyframes dmgAnim {
    0% {opacity: 1; transform: translate(0,0);}
    100% {opacity: 0; transform: translate(var(--x), var(--y));}
}
</style>
</head>

<body>

<button id="shopBtn">🛒</button>

<div class="game">
    <h1>🍎 Apple Clicker</h1>

    <div id="apple">🍎</div>

    <div class="panel">
        <div>Очки: <span id="score">0</span></div>
        <div>Урон: <span id="damage">1</span></div>
    </div>

    <div class="panel">
        <div>Улучшение</div>
        <button onclick="upgradeDamage()">+1 урон (10 очков)</button>
    </div>

    <div class="panel" id="shop">
        <div>Магазин</div>
        <button onclick="buySkin()">Белое яблоко (2500)</button>
    </div>
</div>

<script>
let score = 0;
let damage = 1;
let skinBought = false;

const apple = document.getElementById("apple");
const scoreEl = document.getElementById("score");
const dmgEl = document.getElementById("damage");
const shop = document.getElementById("shop");

document.getElementById("shopBtn").onclick = () => {
    shop.style.display = (shop.style.display === "block") ? "none" : "block";
};

apple.onclick = (e) => {

    score += damage;
    update();

    apple.classList.add("click");
    setTimeout(() => apple.classList.remove("click"), 80);

    // 💥 урон текст в разные стороны
    let t = document.createElement("div");
    t.className = "dmgText";
    t.innerText = "+" + damage;

    let x = (Math.random() * 80 - 40) + "px";
    let y = (Math.random() * -80 - 20) + "px";

    t.style.setProperty("--x", x);
    t.style.setProperty("--y", y);

    t.style.left = e.pageX + "px";
    t.style.top = e.pageY + "px";

    document.body.appendChild(t);
    setTimeout(()=>t.remove(),600);
};

function upgradeDamage(){
    if(score >= 10){
        score -= 10;
        damage += 1;
        update();
    }
}

function buySkin(){
    if(score >= 2500 && !skinBought){
        score -= 2500;
        skinBought = true;
        apple.innerText = "🍏";
        apple.style.filter = "brightness(1.8) grayscale(1)";
        update();
    }
}

function update(){
    scoreEl.textContent = score;
    dmgEl.textContent = damage;
}
</script>

</body>
</html>
