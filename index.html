<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>Apple Game</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden; /* ❗ запрещает "уезд" экрана */
    font-family: Arial;
    background: #1e1e2f;
    color: white;
}

/* Центр всей игры */
.game {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
}

h1 {
    margin: 10px;
}

#apple {
    font-size: 120px;
    cursor: pointer;
    user-select: none;
    transition: transform 0.08s;
}

/* фиксированная анимация клика */
#apple.click {
    transform: scale(0.9);
}

.panel {
    background: #2c2c44;
    padding: 10px;
    margin-top: 10px;
    width: 260px;
    border-radius: 10px;
}

#shopBtn {
    position: fixed;
    top: 10px;
    right: 10px;
    font-size: 24px;
    background: #2c2c44;
    border: none;
    border-radius: 8px;
    padding: 8px;
}

#shop {
    display: none;
}

.critText {
    position: absolute;
    color: orange;
    font-weight: bold;
    animation: fade 1s forwards;
    pointer-events: none;
}

@keyframes fade {
    0% {opacity: 1; transform: translateY(0);}
    100% {opacity: 0; transform: translateY(-30px);}
}
</style>
</head>

<body>

<button id="shopBtn">🛒</button>

<div class="game">
    <h1>🍎 Apple Clicker</h1>

    <div id="apple">🍎</div>

    <div class="panel">
        <div>Очки: <span id="score">0</span></div>
    </div>

    <div class="panel" id="shop">
        <div>Магазин</div>
        <button onclick="buySkin()">Белое яблоко (2500)</button>
    </div>
</div>

<script>
let score = 0;
let skinBought = false;

const apple = document.getElementById("apple");
const scoreEl = document.getElementById("score");
const shop = document.getElementById("shop");

document.getElementById("shopBtn").onclick = () => {
    shop.style.display = (shop.style.display === "block") ? "none" : "block";
};

apple.onclick = (e) => {
    score += 1;
    update();

    // стабильный клик без "уезда"
    apple.classList.add("click");
    setTimeout(() => apple.classList.remove("click"), 80);

    // крит эффект (редкий)
    if (Math.random() < 0.02) {
        let t = document.createElement("div");
        t.className = "critText";
        t.innerText = "КРИТ!";
        t.style.left = e.pageX + "px";
        t.style.top = e.pageY + "px";
        document.body.appendChild(t);
        setTimeout(()=>t.remove(),1000);
    }
};

function buySkin(){
    if(score >= 2500 && !skinBought){
        score -= 2500;
        skinBought = true;
        apple.innerText = "🍏";
        apple.style.filter = "brightness(1.8) grayscale(1)";
        update();
    }
}

function update(){
    scoreEl.textContent = score;
}
</script>

</body>
</html>
