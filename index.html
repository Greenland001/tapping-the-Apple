<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apple Clicker: Swipe Edition</title>
    <style>
        :root {
            --common: #ffffff; --rare: #2ecc71; --epic: #9b59b6; --mythic: #e74c3c; --legendary: #f1c40f;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #121212;
            color: white;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; margin: 0; overflow: hidden;
            user-select: none; touch-action: none; /* Отключаем стандартные жесты браузера */
        }

        @keyframes rainbow {
            0% { filter: hue-rotate(0deg) drop-shadow(0 0 10px red); }
            50% { filter: hue-rotate(180deg) drop-shadow(0 0 10px blue); }
            100% { filter: hue-rotate(360deg) drop-shadow(0 0 10px red); }
        }
        .rainbow-skin { animation: rainbow 3s linear infinite !important; }

        #secret-zone { position: fixed; top: 0; left: 0; width: 60px; height: 60px; z-index: 1000; }

        #score-box { text-align: center; margin-top: 40px; pointer-events: none; }
        #score { font-size: 65px; font-weight: 900; color: #f1c40f; display: block; }
        
        #apple {
            font-size: 160px; cursor: pointer; transition: transform 0.05s;
            margin: 40px 0; display: inline-block; touch-action: manipulation;
        }
        #apple:active { transform: scale(0.9); }

        .upg-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 320px; }
        .upg-btn {
            background: #222; border: 1px solid #333; color: white; padding: 12px;
            border-radius: 15px; font-size: 14px; touch-action: manipulation;
        }
        .upg-btn:disabled { opacity: 0.3; }

        /* Магазин */
        #shop-panel {
            position: fixed; top: 0; right: -100%; width: 85%; height: 100%;
            background: #1a1a1a; transition: 0.3s ease-out; z-index: 300;
            display: flex; flex-direction: column; padding: 20px; box-sizing: border-box;
            box-shadow: -5px 0 20px rgba(0,0,0,0.5);
        }
        #shop-panel.open { right: 0; }

        .skins-list { overflow-y: auto; flex-grow: 1; touch-action: pan-y; }
        .skin-card {
            background: #252525; border-left: 5px solid; margin-bottom: 12px;
            padding: 12px; display: flex; align-items: center; border-radius: 10px;
        }
        .skin-preview { font-size: 30px; margin-right: 15px; width: 40px; text-align: center; }
        .skin-info { flex-grow: 1; }
        .buy-skin-btn { background: #fff; color: #000; border: none; padding: 10px; border-radius: 8px; font-weight: bold; min-width: 80px; }

        #dev-menu {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #34495e; padding: 30px; border-radius: 20px; z-index: 1000; text-align: center;
        }
        .dev-btn { background: white; color: black; border: none; padding: 10px 20px; margin: 10px; border-radius: 8px; font-weight: bold; }

        .swipe-hint { position: fixed; right: 10px; top: 50%; color: #333; font-size: 12px; writing-mode: vertical-rl; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="secret-zone" onclick="stepSecret('corner')"></div>
    <div class="swipe-hint">СВАЙП ВЛЕВО ДЛЯ МАГАЗИНА ←</div>

    <div id="score-box">
        <span id="score">0</span>
        <div style="color: #555;">Авто-доход: <span id="auto-val">0</span>/сек</div>
    </div>

    <div id="apple" onclick="stepSecret('apple')">🍎</div>

    <div class="upg-buttons">
        <button class="upg-btn" id="btn-click" onclick="buyClick()">Клик<br>Цена: 15</button>
        <button class="upg-btn" id="btn-auto" onclick="buyAuto()">Авто<br>Цена: 50</button>
    </div>

    <div id="shop-panel">
        <h2 style="text-align: center; color: #f1c40f;">Магазин скинов</h2>
        <p style="text-align: center; font-size: 12px; color: #666;">(Смахни вправо, чтобы выйти)</p>
        <div class="skins-list" id="skins-list"></div>
    </div>

    <div id="dev-menu">
        <h2 style="color: #f1c40f;">ADMIN PANEL</h2>
        <button class="dev-btn" onclick="addMoney(1000000)">+1.000.000 🍎</button><br>
        <button class="dev-btn" onclick="closeDev()">ЗАКРЫТЬ</button>
    </div>

    <script>
        // ЗАЩИТА
        document.onkeydown = function(e) {
            if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) return false;
        };

        (function() {
            let score = 0;
            let clickPower = 1;
            let upgClickCost = 15;
            let autoClickers = 0;
            let upgAutoCost = 50;
            let ownedSkins = ['default'];
            let currentFilter = "none";
            let codePath = ""; 

            // СВАЙПЫ
            let touchStartX = 0;
            let touchEndX = 0;

            document.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, false);
            document.addEventListener('touchend', e => {
                touchEndX = e.changedTouches[0].screenX;
                handleSwipe();
            }, false);

            function handleSwipe() {
                const swipeDistance = touchStartX - touchEndX;
                // Свайп влево (открыть магазин)
                if (swipeDistance > 100) toggleShop(true);
                // Свайп вправо (закрыть магазин)
                if (swipeDistance < -100) toggleShop(false);
            }

            const skins = [
                { id: 'default', name: 'Обычное', rarity: 'Common', price: 0, filter: 'none', color: '#fff' },
                { id: 'green', name: 'Зеленое', rarity: 'Common', price: 1500, filter: 'hue-rotate(100deg)', color: '#fff' },
                { id: 'dark', name: 'Темное', rarity: 'Common', price: 2000, filter: 'brightness(0.15)', color: '#fff' },
                { id: 'small', name: 'Маленькое', rarity: 'Rare', price: 8000, filter: 'scale(0.6)', color: '#2ecc71' },
                { id: 'dirty', name: 'Грязное', rarity: 'Rare', price: 6500, filter: 'sepia(0.8) brightness(0.6) hue-rotate(-20deg)', color: '#2ecc71' },
                { id: 'ice', name: 'Лед', rarity: 'Epic', price: 35500, filter: 'hue-rotate(190deg) brightness(1.5)', color: '#9b59b6' },
                { id: 'matrix', name: 'Матрица', rarity: 'Epic', price: 25000, filter: 'hue-rotate(120deg) brightness(1.5) drop-shadow(0 0 10px green)', color: '#9b59b6' },
                { id: 'fire', name: 'Горячее', rarity: 'Mythic', price: 75000, filter: 'hue-rotate(340deg) brightness(1.2) drop-shadow(0 0 20px orange)', color: '#e74c3c' },
                { id: 'rainbow', name: 'Радужное', rarity: 'Legendary', price: 130000, filter: 'rainbow', color: '#f1c40f' }
            ];

            window.loadGame = function() {
                const saved = JSON.parse(localStorage.getItem('apple_swipe_save'));
                if (saved) {
                    score = saved.score; clickPower = saved.clickPower;
                    upgClickCost = saved.upgClickCost; autoClickers = saved.autoClickers;
                    upgAutoCost = saved.upgAutoCost; ownedSkins = saved.ownedSkins;
                    applySkin(saved.currentFilter);
                }
                updateUI();
            };

            function saveGame() {
                const data = { score, clickPower, upgClickCost, autoClickers, upgAutoCost, ownedSkins, currentFilter };
                localStorage.setItem('apple_swipe_save', JSON.stringify(data));
            }

            function applySkin(filter) {
                currentFilter = filter;
                const apple = document.getElementById('apple');
                apple.className = (filter === 'rainbow') ? 'rainbow-skin' : '';
                apple.style.filter = (filter === 'rainbow') ? '' : filter;
            }

            window.updateUI = function() {
                document.getElementById('score').innerText = Math.floor(score);
                document.getElementById('auto-val').innerText = autoClickers;
                document.getElementById('btn-click').innerHTML = `Клик: +${clickPower}<br>Цена: ${upgClickCost}`;
                document.getElementById('btn-click').disabled = score < upgClickCost;
                document.getElementById('btn-auto').innerHTML = `Авто: +${autoClickers}<br>Цена: ${upgAutoCost}`;
                document.getElementById('btn-auto').disabled = score < upgAutoCost;
                renderSkins();
                saveGame();
            };

            function renderSkins() {
                const list = document.getElementById('skins-list');
                list.innerHTML = '';
                skins.forEach(skin => {
                    const isOwned = ownedSkins.includes(skin.id);
                    const card = document.createElement('div');
                    card.className = 'skin-card';
                    card.style.borderLeftColor = skin.color;

                    let pClass = (skin.filter === 'rainbow') ? 'skin-preview rainbow-skin' : 'skin-preview';
                    let pFilter = (skin.filter === 'rainbow') ? '' : skin.filter;
                    let btnTxt = isOwned ? (currentFilter === skin.filter ? 'Надето' : 'Выбрать') : skin.price;
                    
                    card.innerHTML = `
                        <div class="${pClass}" style="filter: ${pFilter}">🍎</div>
                        <div class="skin-info">
                            <small style="color:${skin.color}">${skin.rarity}</small><br>
                            <b>${skin.name}</b>
                        </div>
                        <button class="buy-skin-btn" onclick="handleSkin('${skin.id}')" ${!isOwned && score < skin.price ? 'disabled' : ''}>${btnTxt}</button>
                    `;
                    list.appendChild(card);
                });
            }

            window.handleSkin = function(id) {
                const skin = skins.find(s => s.id === id);
                if (ownedSkins.includes(id)) {
                    applySkin(skin.filter);
                } else if (score >= skin.price) {
                    score -= skin.price;
                    ownedSkins.push(id);
                    applySkin(skin.filter);
                }
                updateUI();
            };

            document.getElementById('apple').addEventListener('pointerdown', (e) => {
                score += clickPower;
                updateUI();
            });

            window.buyClick = function() {
                if (score >= upgClickCost) {
                    score -= upgClickCost; clickPower++;
                    upgClickCost = Math.round(upgClickCost * 1.5);
                    updateUI();
                }
            };

            window.buyAuto = function() {
                if (score >= upgAutoCost) {
                    score -= upgAutoCost; autoClickers++;
                    upgAutoCost = Math.round(upgAutoCost * 1.6);
                    updateUI();
                }
            };

            window.stepSecret = function(type) {
                if (type === 'apple') codePath += "A";
                if (type === 'corner') codePath += "C";
                if (codePath.includes("AAACC")) {
                    document.getElementById('dev-menu').style.display = 'block';
                    codePath = "";
                }
            };

            window.addMoney = function(n) { score += n; updateUI(); };
            window.closeDev = function() { document.getElementById('dev-menu').style.display = 'none'; };
            window.toggleShop = function(s) { document.getElementById('shop-panel').classList.toggle('open', s); };

            setInterval(() => { if (autoClickers > 0) { score += autoClickers; updateUI(); } }, 1000);
            loadGame();
        })();
    </script>
</body>
</html>
