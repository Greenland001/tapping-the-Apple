<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Яблоко = Очки</title>

<style>
    body{
        margin:0;
        height:100vh;
        display:flex;
        flex-direction:column;
        justify-content:center;
        align-items:center;
        background:#111827;
        font-family:Arial, sans-serif;
        color:white;
    }

    h1{
        margin-bottom:20px;
    }

    #score{
        font-size:40px;
        margin-bottom:30px;
    }

    /* Яблоко */
    #apple{
        width:140px;
        height:140px;
        background:red;
        border-radius:50%;
        position:relative;
        cursor:pointer;
        transition:0.1s;
        box-shadow:0 0 25px rgba(255,0,0,0.5);
    }

    /* Листик */
    #apple::before{
        content:"";
        width:35px;
        height:20px;
        background:green;
        position:absolute;
        top:-10px;
        left:80px;
        border-radius:50%;
        transform:rotate(30deg);
    }

    /* Палочка */
    #apple::after{
        content:"";
        width:8px;
        height:25px;
        background:brown;
        position:absolute;
        top:-18px;
        left:63px;
        border-radius:10px;
    }

    #apple:active{
        transform:scale(0.92);
    }
</style>
</head>
<body>

<h1>Нажимай на яблоко!</h1>

<div id="score">Очки: 0</div>

<div id="apple"></div>

<script>
    let score = 0;

    const apple = document.getElementById("apple");
    const scoreText = document.getElementById("score");

    apple.addEventListener("click", () => {
        score++;
        scoreText.textContent = "Очки: " + score;
    });
</script>

</body>
