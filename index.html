<script>
let score = Number(localStorage.getItem("score")) || 0;
let damage = Number(localStorage.getItem("damage")) || 1;
let price = Number(localStorage.getItem("price")) || 60;

const scoreText = document.getElementById("score");
const apple = document.getElementById("apple");
const shop = document.getElementById("upgrade");
const critText = document.getElementById("critText");

function save(){
    localStorage.setItem("score", score);
    localStorage.setItem("damage", damage);
    localStorage.setItem("price", price);
}

function update(){
    scoreText.textContent = "Очки: " + score;
    shop.textContent = `Улучшение (+${damage}) — ${price}`;
}

function showCrit(){
    critText.style.opacity = 1;

    setTimeout(() => {
        critText.style.opacity = 0;
    }, 1000);
}

apple.onclick = () => {
    let gain = damage;

    if(Math.random() < 0.10){
        gain = 10;
        showCrit();
    }

    score += gain;
    save();
    update();
};

shop.onclick = () => {
    if(score >= price){
        score -= price;

        // 💡 вот ИСПРАВЛЕНИЕ
        if(damage < 25){
            damage += 1;
        } else {
            damage += 2;
        }

        price = Math.floor(price * 1.35 + damage);

        save();
        update();
    }
};

update();
</script>
