<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apple Clicker 3.3</title>

<style>
html,body{
margin:0;
height:100%;
overflow:hidden;
font-family:Arial;
background:#151520;
color:white;
}

.game{
height:100%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
}

#apple{
font-size:120px;
cursor:pointer;
user-select:none;
transition:transform .08s;
}

#apple:active{transform:scale(0.92);}

.panel{
background:#2c2c44;
padding:10px;
margin-top:10px;
width:300px;
border-radius:10px;
}

button{
padding:8px;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:6px;
width:100%;
}

/* SHOP */
#shop{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#111;
padding:10px;
display:none;
z-index:10;
}

.shopBox{
max-width:400px;
margin:auto;
background:#2c2c44;
padding:10px;
border-radius:10px;
text-align:center;
}

/* DEV */
#dev{
position:fixed;
bottom:10px;
right:10px;
background:#000;
padding:10px;
border-radius:10px;
width:180px;
font-size:14px;
z-index:9999;
}

#dev button{
font-size:12px;
}

/* SKINS */
.green{color:lime;text-shadow:0 0 10px lime;}
.black{color:white;}
.gold{color:gold;text-shadow:0 0 12px gold;}

</style>
</head>

<body>

<div class="game">

<div id="apple">🍎</div>

<div class="panel">
Очки: <span id="score">0</span><br>
Урон: <span id="damage">1</span>
</div>

<div class="panel">

<b>Улучшения</b>

<div style="margin-top:5px;">
<b>Улучшение клика</b><br>
Цена: <span id="cost">50</span><br>
<button onclick="upgrade()">+1 урон</button>
</div>

</div>

<div class="panel">
<button onclick="openShop()">🛒 Магазин</button>
</div>

</div>

<!-- SHOP -->
<div id="shop">
<div class="shopBox">

<h3>Магазин</h3>

<button onclick="buy('green',1000)">🟢 1000</button>
<button onclick="buy('black',5000)">⚪ 5000</button>
<button onclick="buy('gold',100000)">🥇 100000</button>

<button onclick="closeShop()">Закрыть</button>

</div>
</div>

<!-- DEV -->
<div id="dev">
<button onclick="document.getElementById('dev').style.display='none'">❌</button>
<b>DEV</b><be>
<button onclick="addScore()">+10000</button>

<div style="margin-top:5px;">Скины:</div>
<button onclick="setSkin('green')">Green</button>
<button onclick="setSkin('black')">Black</button>
<button onclick="setSkin('gold')">Gold</button>

</div>

<script>

let score=0;
let damage=1;
let cost=50;

let owned={green:false,black:false,gold:false};
let current=null;

/* SAVE */
function save(){
localStorage.setItem("s",score);
localStorage.setItem("d",damage);
localStorage.setItem("c",cost);
localStorage.setItem("o",JSON.stringify(owned));
}

/* LOAD */
function load(){
let s=localStorage.getItem("s");
let d=localStorage.getItem("d");
let c=localStorage.getItem("c");
let o=localStorage.getItem("o");

if(s)score=+s;
if(d)damage=+d;
if(c)cost=+c;
if(o)owned=JSON.parse(o);

update();
}

/* UPDATE */
function update(){
document.getElementById("score").textContent=score;
document.getElementById("damage").textContent=damage;
document.getElementById("cost").textContent=cost;
}

/* CLICK */
document.getElementById("apple").onclick=()=>{

score+=damage;
update();
save();
};

/* UPGRADE */
function upgrade(){
if(score>=cost){
score-=cost;

if(damage>=30){
damage+=2;
cost=Math.floor(cost*1.8+50);
}else{
damage+=1;
cost=Math.floor(cost*1.4+20);
}

update();
save();
}
}

/* SHOP */
function openShop(){
document.getElementById("shop").style.display="block";
}
function closeShop(){
document.getElementById("shop").style.display="none";
}

/* BUY */
function buy(type,p){

if(owned[type]){
apply(type);
return;
}

if(score<p){
alert("НЕ ХВАТАЕТ ОЧКОВ");
return;
}

score-=p;
owned[type]=true;
apply(type);

update();
save();
}

/* SKINS */
function apply(s){

let a=document.getElementById("apple");

a.className="";

if(s==="green"){a.innerText="🍏";a.classList.add("green");}
if(s==="black"){a.innerText="🍎";a.classList.add("black");}
if(s==="gold"){a.innerText="🍎";a.classList.add("gold");}

current=s;
save();
}

/* DEV */
function addScore(){
score+=10000;
update();
save();
}

function setSkin(s){
apply(s);
}

load();
update();

</script>

</body>
</html>
