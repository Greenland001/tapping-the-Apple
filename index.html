<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Яблоко Кликер</title>

<style>
    body{
        margin:0;
        height:100vh;
        display:flex;
        flex-direction:column;
        justify-content:center;
        align-items:center;
        background:#111827;
        font-family:Arial, sans-serif;
        color:white;
    }

    h1{
        margin-bottom:10px;
    }

    #score{
        font-size:40px;
        margin-bottom:20px;
    }

    #apple{
        width:140px;
        height:140px;
        background:red;
        border-radius:50%;
        position:relative;
        cursor:pointer;
        transition:transform 0.1s;
        box-shadow:0 0 20px rgba(255,0,0,0.5);
        margin-bottom:20px;
    }

    #apple .stick{
        position:absolute;
        width:8px;
        height:25px;
        background:brown;
        top:-18px;
        left:66px;
        border-radius:10px;
    }

    #apple .leaf{
        position:absolute;
        width:35px;
        height:20px;
        background:green;
        top:-10px;
        left:78px;
        border-radius:50%;
        transform:rotate(30deg);
    }

    #apple:active{
        transform:scale(0.9);
    }

    #shop{
        margin-top:10px;
    }

    button{
        padding:10px 15px;
        font-size:16px;
        cursor:pointer;
        border:none;
        border-radius:10px;
    }

    button:disabled{
        background:gray;
        cursor:not-allowed;
    }
</style>
</head>
<body>

<h1>Нажимай на яблоко!</h1>

<div id="score">Очки: 0</div>

<div id="apple">
    <div class="stick"></div>
    <div class="leaf"></div>
</div>

<div id="shop">
    <button id="upgradeBtn">Купить улучшение (+1 к клику) — 60</button>
</div>

<script>
    let score = 0;
    let perClick = 1;
    let upgradeBought = false;

    const apple = document.getElementById("apple");
    const scoreText = document.getElementById("score");
    const upgradeBtn = document.getElementById("upgradeBtn");

    function updateScore(){
        scoreText.textContent = "Очки: " + score;
    }

    apple.onclick = function(){
        score += perClick;
        updateScore();
    };

    upgradeBtn.onclick = function(){
        if(score >= 60 && !upgradeBought){
            score -= 60;
            perClick = 2;
            upgradeBought = true;

            upgradeBtn.textContent = "Улучшение куплено";
            upgradeBtn.disabled = true;

            updateScore();
        }
    };
</script>

</body>
</html>
