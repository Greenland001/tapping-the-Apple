<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apple Brawl: Island Survival</title>
    <style>
        body { margin: 0; background: #1e3799; overflow: hidden; font-family: sans-serif; touch-action: none; user-select: none; }
        canvas { display: block; }

        #ui { position: absolute; top: 15px; left: 15px; color: white; pointer-events: none; text-shadow: 2px 2px 4px #000; }
        #joy-container {
            position: absolute; bottom: 40px; left: 40px;
            width: 120px; height: 120px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%; border: 2px solid rgba(255,255,255,0.3);
        }
        #joy-stick {
            position: absolute; top: 30px; left: 30px;
            width: 60px; height: 60px;
            background: rgba(255,255,255,0.5);
            border-radius: 50%;
        }
        #action-btn {
            position: absolute; bottom: 50px; right: 50px;
            width: 90px; height: 90px;
            background: #e74c3c; border-radius: 50%;
            border: 4px solid #c0392b; color: white;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div style="font-size: 24px;">🍎 Яблоки: <span id="score">0</span></div>
        <div id="status">Держись на земле!</div>
    </div>

    <canvas id="game"></canvas>

    <div id="joy-container"><div id="joy-stick"></div></div>
    <div id="action-btn">ПРЫЖОК</div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let score = 0;
        let gameState = "play";

        // Параметры Острова (Земли)
        const island = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            width: 400,
            height: 500
        };

        let player = {
            x: island.x,
            y: island.y,
            size: 30,
            speed: 5,
            vx: 0, vy: 0,
            z: 0, vz: 0,
            isJumping: false,
            isFalling: false
        };

        let apples = [];

        // Управление (Джойстик)
        const joyContainer = document.getElementById('joy-container');
        const joyStick = document.getElementById('joy-stick');
        let joyActive = false;

        joyContainer.addEventListener('touchstart', (e) => { joyActive = true; moveStick(e); });
        window.addEventListener('touchmove', (e) => { if(joyActive) moveStick(e); });
        window.addEventListener('touchend', () => { 
            joyActive = false; 
            joyStick.style.transform = `translate(0, 0)`;
            player.vx = 0; player.vy = 0;
        });

        function moveStick(e) {
            if (player.isFalling) return;
            const touch = e.touches[0];
            const rect = joyContainer.getBoundingClientRect();
            const dx = touch.clientX - (rect.left + 60);
            const dy = touch.clientY - (rect.top + 60);
            const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 40);
            const angle = Math.atan2(dy, dx);
            
            joyStick.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
            player.vx = Math.cos(angle) * (dist/40) * player.speed;
            player.vy = Math.sin(angle) * (dist/40) * player.speed;
        }

        document.getElementById('action-btn').addEventListener('touchstart', (e) => {
            if (!player.isJumping && !player.isFalling) {
                player.vz = 10;
                player.isJumping = true;
            }
        });

        function spawnApple() {
            if (apples.length < 3) {
                apples.push({
                    x: island.x - island.width/2 + 30 + Math.random()*(island.width-60),
                    y: island.y - island.height/2 + 30 + Math.random()*(island.height-60)
                });
            }
        }

        function update() {
            if (player.isFalling) {
                player.z -= 5;
                if (player.z < -500) restart();
                return;
            }

            player.x += player.vx;
            player.y += player.vy;

            // Прыжок
            if (player.isJumping) {
                player.z += player.vz;
                player.vz -= 0.6;
                if (player.z <= 0) { player.z = 0; player.isJumping = false; }
            }

            // Проверка: На земле ли мы?
            const onIsland = (
                player.x > island.x - island.width/2 &&
                player.x < island.x + island.width/2 &&
                player.y > island.y - island.height/2 &&
                player.y < island.y + island.height/2
            );

            if (!onIsland && !player.isJumping) {
                player.isFalling = true;
                player.vx = 0; player.vy = 0;
            }

            // Сбор яблок
            apples.forEach((apple, i) => {
                const d = Math.sqrt((player.x - apple.x)**2 + (player.y - apple.y)**2);
                if (d < 30 && !player.isJumping) {
                    apples.splice(i, 1);
                    score++;
                    document.getElementById('score').innerText = score;
                }
            });

            spawnApple();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Отрисовка острова (Земля)
            ctx.fillStyle = "#2ecc71"; // Трава
            ctx.fillRect(island.x - island.width/2, island.y - island.height/2, island.width, island.height);
            // Бортик земли для объема
            ctx.fillStyle = "#78e08f";
            ctx.fillRect(island.x - island.width/2, island.y + island.height/2, island.width, 10);

            // Яблоки
            ctx.font = "30px Arial";
            apples.forEach(a => ctx.fillText("🍎", a.x - 15, a.y + 10));

            // Игрок
            ctx.fillStyle = player.isFalling ? "#ff4d4d" : "white";
            ctx.fillRect(player.x - 15, player.y - 15 - player.z, 30, 30);
            ctx.strokeStyle = "black";
            ctx.strokeRect(player.x - 15, player.y - 15 - player.z, 30, 30);

            update();
            requestAnimationFrame(draw);
        }

        function restart() {
            player.x = island.x;
            player.y = island.y;
            player.z = 0;
            player.isFalling = false;
            player.vx = 0; player.vy = 0;
            score = 0;
            document.getElementById('score').innerText = score;
            apples = [];
        }

        draw();
    </script>
</body>
</html>
