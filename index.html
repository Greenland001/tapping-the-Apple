<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>Apple Game</title>

<style>
html, body{
    margin:0;
    height:100%;
    overflow:hidden;
    font-family:Arial;
    background: radial-gradient(circle at top, #2b2b45, #151520);
    color:white;
}

.game{
    height:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
}

h1{
    margin:10px;
    opacity:0.9;
}

#apple{
    font-size:120px;
    cursor:pointer;
    user-select:none;
    transition:transform 0.08s, filter 0.2s;
    filter: drop-shadow(0 10px 10px rgba(0,0,0,0.4));
}

#apple.click{
    transform:scale(0.92);
}

.panel{
    background:#2c2c44;
    padding:10px;
    margin-top:10px;
    width:260px;
    border-radius:10px;
}

button{
    padding:8px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin-top:5px;
}

#shopBtn{
    position:fixed;
    top:10px;
    right:10px;
    font-size:24px;
    background:#2c2c44;
    border:none;
    border-radius:8px;
    padding:8px;
}

#shop{ display:none; }

.dmgText{
    position:absolute;
    font-weight:bold;
    color:#66ccff;
    animation:fly 0.6s forwards;
    pointer-events:none;
}

@keyframes fly{
    0%{opacity:1; transform:translate(0,0);}
    100%{opacity:0; transform:translate(var(--x), var(--y));}
}
</style>
</head>

<body>

<button id="shopBtn">🛒</button>

<div class="game">

    <h1>🍎 Apple Clicker</h1>

    <div id="apple">🍎</div>

    <div class="panel">
        <div>Очки: <span id="score">0</span></div>
        <div>Урон: <span id="damage">1</span></div>
    </div>

    <div class="panel">
        <div>Улучшение</div>
        <div>Цена: <span id="cost">50</span></div>
        <button onclick="upgradeDamage()">+1 урон</button>
    </div>

    <div class="panel" id="shop">
        <button onclick="buySkin()">Белое яблоко (2500)</button>
    </div>

</div>

<script>
let score = 0;
let damage = 1;
let cost = 50;
let skinBought = false;

const apple = document.getElementById("apple");
const scoreEl = document.getElementById("score");
const dmgEl = document.getElementById("damage");
const costEl = document.getElementById("cost");
const shop = document.getElementById("shop");

/* ======================
   💾 Сохранение
====================== */
function saveGame(){
    localStorage.setItem("score", score);
    localStorage.setItem("damage", damage);
    localStorage.setItem("cost", cost);
    localStorage.setItem("skin", skinBought);
}

function loadGame(){
    let s = localStorage.getItem("score");
    let d = localStorage.getItem("damage");
    let c = localStorage.getItem("cost");
    let sk = localStorage.getItem("skin");

    if(s!==null) score=Number(s);
    if(d!==null) damage=Number(d);
    if(c!==null) cost=Number(c);
    if(sk==="true"){
        skinBought=true;
        apple.innerText="🍏";
        apple.style.filter="brightness(1.6) grayscale(1)";
    }
}

/* ======================
   🔊 мягкий звук "кус"
====================== */
let audioCtx;

function biteSound(){
    if(!audioCtx){
        audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    }

    let o = audioCtx.createOscillator();
    let g = audioCtx.createGain();

    o.type = "triangle";
    o.frequency.value = 180 + Math.random()*40; // мягкий "кус"

    g.gain.value = 0.05;

    o.connect(g);
    g.connect(audioCtx.destination);

    o.start();

    o.frequency.exponentialRampToValueAtTime(60, audioCtx.currentTime + 0.08);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);

    o.stop(audioCtx.currentTime + 0.09);
}

/* ======================
   🎮 игра
====================== */
document.getElementById("shopBtn").onclick=()=>{
    shop.style.display = shop.style.display==="block"?"none":"block";
};

apple.onclick=(e)=>{

    biteSound();

    score += damage;

    apple.classList.add("click");
    setTimeout(()=>apple.classList.remove("click"),80);

    let t = document.createElement("div");
    t.className = "dmgText";
    t.innerText = "+" + damage;

    let x = (Math.random()*80-40)+"px";
    let y = (Math.random()*-80-20)+"px";

    t.style.setProperty("--x",x);
    t.style.setProperty("--y",y);

    t.style.left=e.pageX+"px";
    t.style.top=e.pageY+"px";

    document.body.appendChild(t);
    setTimeout(()=>t.remove(),600);

    update();
    saveGame();
};

function upgradeDamage(){
    if(score >= cost){
        score -= cost;
        damage++;

        cost = Math.floor(cost * 1.5 + 20);

        update();
        saveGame();
    }
}

function buySkin(){
    if(score >= 2500 && !skinBought){
        score -= 2500;
        skinBought = true;

        apple.innerText="🍏";
        apple.style.filter="brightness(1.6) grayscale(1)";

        update();
        saveGame();
    }
}

function update(){
    scoreEl.textContent = score;
    dmgEl.textContent = damage;
    costEl.textContent = cost;
}

/* загрузка */
loadGame();
update();
</script>

</body>
</html>
