<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Apple Clicker</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            user-select: none;
        }

        #score-container {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
        }

        #apple {
            width: 200px;
            cursor: pointer;
            transition: transform 0.1s;
        }

        #apple:active {
            transform: scale(0.9);
        }

        #shop {
            margin-top: 50px;
            padding: 20px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        .upgrade-btn {
            background-color: #4CAF50;
            border: none;
            color: white;
            padding: 15px 32px;
            text-align: center;
            font-size: 16px;
            margin: 4px 2px;
            cursor: pointer;
            border-radius: 8px;
            transition: background 0.3s;
        }

        .upgrade-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        .info {
            font-size: 14px;
            color: #666;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div id="score-container">Очки: <span id="score">0</span></div>
    
    <!-- Вместо картинки используем большое Эмодзи яблока -->
    <div id="apple" style="font-size: 150px; text-align: center;">🍎</div>

    <div id="shop">
        <h3>Магазин улучшений</h3>
        <button id="upgradeBtn" class="upgrade-btn">
            Улучшить клик (+1)
        </button>
        <div class="info">Цена: <span id="upgradeCost">10</span> очков</div>
        <div class="info">Сейчас за клик: <span id="clickPower">1</span></div>
    </div>

    <script>
        // Начальные данные
        let score = 0;
        let clickPower = 1;
        let upgradeCost = 10;

        // Элементы страницы
        const scoreDisplay = document.getElementById('score');
        const apple = document.getElementById('apple');
        const upgradeBtn = document.getElementById('upgradeBtn');
        const upgradeCostDisplay = document.getElementById('upgradeCost');
        const clickPowerDisplay = document.getElementById('clickPower');

        // Функция обновления текста на экране
        function updateDisplay() {
            scoreDisplay.innerText = Math.floor(score);
            upgradeCostDisplay.innerText = upgradeCost;
            clickPowerDisplay.innerText = clickPower;
            
            // Если денег не хватает, кнопка становится серой
            if (score < upgradeCost) {
                upgradeBtn.disabled = true;
            } else {
                upgradeBtn.disabled = false;
            }
        }

        // Клик по яблоку
        apple.addEventListener('click', () => {
            score += clickPower;
            updateDisplay();
        });

        // Покупка улучшения
        upgradeBtn.addEventListener('click', () => {
            if (score >= upgradeCost) {
                score -= upgradeCost;
                clickPower += 1; // Увеличиваем силу клика
                upgradeCost = Math.round(upgradeCost * 1.5); // Цена растет в 1.5 раза
                updateDisplay();
            }
        });

        // Запускаем проверку кнопок сразу
        updateDisplay();
    </script>
</body>
</html>
