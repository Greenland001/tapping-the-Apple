<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>Apple Game Shop</title>

<style>
html, body{
    margin:0;
    height:100%;
    overflow:hidden;
    font-family:Arial;
    background:#151520;
    color:white;
}

.game{
    height:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
}

#apple{
    font-size:120px;
    cursor:pointer;
    user-select:none;
    transition:transform 0.1s;
    filter:drop-shadow(0 10px 10px rgba(0,0,0,0.5));
}

#apple.click{ transform:scale(0.92); }

.panel{
    background:#2c2c44;
    padding:10px;
    margin-top:10px;
    width:280px;
    border-radius:10px;
}

button{
    padding:8px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin-top:6px;
    width:100%;
}

/* ================= SHOP FULL SCREEN ================= */
#shopOverlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    display:none;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    z-index:10;
}

.shopBox{
    background:#2c2c44;
    padding:20px;
    border-radius:15px;
    width:300px;
    text-align:center;
}

.preview{
    font-size:80px;
    margin:10px 0;
    filter:drop-shadow(0 5px 10px rgba(0,0,0,0.5));
}

#closeShop{
    margin-top:10px;
    background:red;
    color:white;
}

/* skins */
.greenGlow{ filter:drop-shadow(0 0 10px lime); }
.blackGlow{ filter:drop-shadow(0 0 10px purple) brightness(0.7); }
.goldGlow{ filter:drop-shadow(0 0 15px gold) brightness(1.4); }

#shopBtn{
    position:fixed;
    top:10px;
    right:10px;
    font-size:24px;
    background:#2c2c44;
    border:none;
    border-radius:8px;
    padding:8px;
}
</style>
</head>

<body>

<button id="shopBtn">🛒</button>

<div class="game">

    <div id="apple">🍎</div>

    <div class="panel">
        <div>Очки: <span id="score">0</span></div>
        <div>Урон: <span id="damage">1</span></div>
    </div>

    <div class="panel">
        <button onclick="upgradeDamage()">+1 урон</button>
    </div>

</div>

<!-- ================= SHOP OVERLAY ================= -->
<div id="shopOverlay">
    <div class="shopBox">

        <h2>Магазин скинов</h2>

        <div>Предпросмотр:</div>
        <div id="preview" class="preview">🍎</div>

        <button onclick="buySkin('green')">🟢 Зелёное (1000)</button>
        <button onclick="buySkin('black')">🌙 Ночное (5000)</button>
        <button onclick="buySkin('gold')">🥇 Золотое (100000)</button>

        <button id="closeShop" onclick="toggleShop()">Закрыть</button>

    </div>
</div>

<script>
let score=0;
let damage=1;
let cost=50;

let currentSkin="white";

const apple=document.getElementById("apple");
const scoreEl=document.getElementById("score");
const dmgEl=document.getElementById("damage");
const shop=document.getElementById("shopOverlay");
const preview=document.getElementById("preview");

/* OPEN/CLOSE SHOP */
function toggleShop(){
    shop.style.display = shop.style.display==="flex"?"none":"flex";
}

/* SHOP BUTTON */
document.getElementById("shopBtn").onclick=toggleShop;

/* SAVE */
function save(){
    localStorage.setItem("score",score);
    localStorage.setItem("damage",damage);
    localStorage.setItem("skin",currentSkin);
}

function load(){
    let s=localStorage.getItem("score");
    let d=localStorage.getItem("damage");
    let sk=localStorage.getItem("skin");

    if(s) score=Number(s);
    if(d) damage=Number(d);
    if(sk) currentSkin=sk;

    applySkin(currentSkin);
}

/* UPDATE UI */
function update(){
    scoreEl.textContent=score;
    dmgEl.textContent=damage;
}

/* SKINS */
function applySkin(skin){

    apple.className="";
    preview.className="preview";

    if(skin==="green"){
        apple.innerText="🍏";
        preview.innerText="🍏";
        apple.classList.add("greenGlow");
        preview.classList.add("greenGlow");
    }

    if(skin==="black"){
        apple.innerText="🍎";
        preview.innerText="🍎";
        apple.classList.add("blackGlow");
        preview.classList.add("blackGlow");
    }

    if(skin==="gold"){
        apple.innerText="🍎";
        preview.innerText="🍎";
        apple.classList.add("goldGlow");
        preview.classList.add("goldGlow");
    }

    if(skin==="white"){
        apple.innerText="🍎";
        preview.innerText="🍎";
    }

    currentSkin=skin;
    save();
}

/* BUY */
function buySkin(type){

    if(type==="green" && score>=1000){
        score-=1000;
        applySkin("green");
    }

    if(type==="black" && score>=5000){
        score-=5000;
        applySkin("black");
    }

    if(type==="gold" && score>=100000){
        score-=100000;
        applySkin("gold");
    }

    update();
    save();
}

/* UPGRADE */
function upgradeDamage(){
    if(score>=cost){
        score-=cost;
        damage++;
        cost=Math.floor(cost*1.5+20);
        update();
        save();
    }
}

/* CLICK */
apple.onclick=()=>{
    score+=damage;
    update();
    save();
};

/* START */
load();
update();
</script>

</body>
</html>
