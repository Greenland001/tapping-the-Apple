<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apple Brawl Mode</title>
    <style>
        body { margin: 0; background: #222; overflow: hidden; font-family: sans-serif; touch-action: none; user-select: none; }
        canvas { display: block; background: #34495e; }

        /* UI */
        #ui { position: absolute; top: 15px; left: 15px; color: white; pointer-events: none; }
        #score { font-size: 24px; font-weight: bold; color: #f1c40f; }

        /* Джойстик (Крестик) */
        #joy-container {
            position: absolute; bottom: 40px; left: 40px;
            width: 120px; height: 120px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%; border: 2px solid rgba(255,255,255,0.3);
        }
        #joy-stick {
            position: absolute; top: 30px; left: 30px;
            width: 60px; height: 60px;
            background: rgba(255,255,255,0.5);
            border-radius: 50%; box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        /* Кнопка действия (Прыжок/Атака) */
        #action-btn {
            position: absolute; bottom: 50px; right: 50px;
            width: 90px; height: 90px;
            background: #e74c3c; border-radius: 50%;
            border: 4px solid #c0392b; color: white;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 14px;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div id="score">Яблоки: 0</div>
        <div id="lvl-text">Уровень: 1</div>
    </div>

    <canvas id="game"></canvas>

    <div id="joy-container">
        <div id="joy-stick"></div>
    </div>

    <div id="action-btn">ПРЫЖОК</div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let score = 0;
        let lvl = 1;

        // Игрок
        let player = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            size: 40,
            speed: 5,
            vx: 0, vy: 0,
            z: 0, vz: 0, // Для прыжка
            isJumping: false
        };

        let apples = [];

        // Джойстик логика
        const joyContainer = document.getElementById('joy-container');
        const joyStick = document.getElementById('joy-stick');
        let joyActive = false;
        let joyPos = { x: 0, y: 0 };

        joyContainer.addEventListener('touchstart', (e) => { joyActive = true; moveStick(e); });
        window.addEventListener('touchmove', (e) => { if(joyActive) moveStick(e); });
        window.addEventListener('touchend', () => { 
            joyActive = false; 
            joyStick.style.transform = `translate(0, 0)`;
            player.vx = 0; player.vy = 0;
        });

        function moveStick(e) {
            const touch = e.touches[0];
            const rect = joyContainer.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            let dx = touch.clientX - centerX;
            let dy = touch.clientY - centerY;
            const dist = Math.sqrt(dx*dx + dy*dy);
            const maxDist = 40;

            if (dist > maxDist) {
                dx *= maxDist / dist;
                dy *= maxDist / dist;
            }

            joyStick.style.transform = `translate(${dx}px, ${dy}px)`;
            
            // Направление движения игрока
            player.vx = (dx / maxDist) * player.speed;
            player.vy = (dy / maxDist) * player.speed;
        }

        // Прыжок
        document.getElementById('action-btn').addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (!player.isJumping) {
                player.vz = 10;
                player.isJumping = true;
            }
        });

        function spawnApple() {
            if (apples.length < 5) {
                apples.push({
                    x: Math.random() * (canvas.width - 40) + 20,
                    y: Math.random() * (canvas.height - 40) + 20
                });
            }
        }

        function update() {
            // Движение
            player.x += player.vx;
            player.y += player.vy;

            // Прыжок (физика высоты)
            if (player.isJumping) {
                player.z += player.vz;
                player.vz -= 0.6; // Гравитация
                if (player.z <= 0) {
                    player.z = 0;
                    player.isJumping = false;
                }
            }

            // Границы экрана
            player.x = Math.max(20, Math.min(canvas.width - 20, player.x));
            player.y = Math.max(20, Math.min(canvas.height - 20, player.y));

            // Сбор яблок
            apples.forEach((apple, i) => {
                const dist = Math.sqrt((player.x - apple.x)**2 + (player.y - apple.y)**2);
                if (dist < 30) {
                    apples.splice(i, 1);
                    score++;
                    document.getElementById('score').innerText = `Яблоки: ${score}`;
                    if (score % 5 === 0) lvl++;
                    document.getElementById('lvl-text').innerText = `Уровень: ${lvl}`;
                }
            });

            spawnApple();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Сетка пола (как в Starr Park)
            ctx.strokeStyle = "rgba(255,255,255,0.05)";
            for(let i=0; i<canvas.width; i+=50) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke(); }
            for(let i=0; i<canvas.height; i+=50) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width,i); ctx.stroke(); }

            // Тень игрока
            ctx.fillStyle = "rgba(0,0,0,0.3)";
            ctx.beginPath();
            ctx.ellipse(player.x, player.y, 20, 10, 0, 0, Math.PI*2);
            ctx.fill();

            // Яблоки
            ctx.font = "30px Arial";
            apples.forEach(apple => ctx.fillText("🍎", apple.x - 15, apple.y + 10));

            // Игрок (Белый куб с высотой Z)
            ctx.fillStyle = "white";
            ctx.fillRect(player.x - 20, player.y - 20 - player.z, 40, 40);
            ctx.strokeStyle = "black";
            ctx.strokeRect(player.x - 20, player.y - 20 - player.z, 40, 40);

            update();
            requestAnimationFrame(draw);
        }

        setInterval(spawnApple, 2000);
        draw();
    </script>
</body>
</html>
