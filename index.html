<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Яблоко Кликер</title>

<style>
    body{
        margin:0;
        height:100vh;
        display:flex;
        flex-direction:column;
        justify-content:center;
        align-items:center;
        background:#111827;
        font-family:Arial, sans-serif;
        color:white;
    }

    #score{
        font-size:40px;
        margin-bottom:20px;
    }

    #apple{
        width:140px;
        height:140px;
        background:red;
        border-radius:50%;
        position:relative;
        cursor:pointer;
        margin-bottom:20px;
        box-shadow:0 0 20px rgba(255,0,0,0.5);
        transition:0.1s;
    }

    #apple:active{
        transform:scale(0.9);
    }

    #apple .stick{
        position:absolute;
        width:8px;
        height:25px;
        background:brown;
        top:-18px;
        left:66px;
        border-radius:10px;
    }

    #apple .leaf{
        position:absolute;
        width:35px;
        height:20px;
        background:green;
        top:-10px;
        left:78px;
        border-radius:50%;
        transform:rotate(30deg);
    }

    button{
        padding:10px;
        margin:5px;
        border:none;
        border-radius:10px;
        cursor:pointer;
    }

    button:disabled{
        background:gray;
        cursor:not-allowed;
    }
</style>
</head>

<body>

<div id="score">Очки: 0</div>

<div id="apple">
    <div class="stick"></div>
    <div class="leaf"></div>
</div>

<button id="up1">Улучшение 1 (+2) — 60</button>
<button id="up2">Улучшение 2 (+3) — 200</button>

<script>
let score = Number(localStorage.getItem("score")) || 0;
let perClick = Number(localStorage.getItem("perClick")) || 1;
let up1 = localStorage.getItem("up1") === "true";
let up2 = localStorage.getItem("up2") === "true";

const scoreText = document.getElementById("score");
const apple = document.getElementById("apple");
const btn1 = document.getElementById("up1");
const btn2 = document.getElementById("up2");

function save(){
    localStorage.setItem("score", score);
    localStorage.setItem("perClick", perClick);
    localStorage.setItem("up1", up1);
    localStorage.setItem("up2", up2);
}

function render(){
    scoreText.textContent = "Очки: " + score;

    if(up1){
        btn1.textContent = "Куплено";
        btn1.disabled = true;
    }

    if(!up1){
        btn2.disabled = true;
        btn2.textContent = "Сначала купи 1 улучшение";
    }

    if(up1 && !up2){
        btn2.disabled = false;
        btn2.textContent = "Улучшение 2 (+3) — 200";
    }

    if(up2){
        btn2.textContent = "Куплено";
        btn2.disabled = true;
    }
}

apple.onclick = () => {
    score += perClick;
    save();
    render();
};

btn1.onclick = () => {
    if(score >= 60 && !up1){
        score -= 60;
        perClick = 2;
        up1 = true;
        save();
        render();
    }
};

btn2.onclick = () => {
    if(score >= 200 && up1 && !up2){
        score -= 200;
        perClick = 3;
        up2 = true;
        save();
        render();
    }
};

render();
</script>

</body>
</html>
