<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Apple Game</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#1e1e2f;
    color:white;
    text-align:center;
}

h1{margin-top:20px;}

#apple{
    font-size:120px;
    cursor:pointer;
    user-select:none;
    display:inline-block;
    transition:transform 0.08s;
}

.panel{
    background:#2c2c44;
    padding:12px;
    margin:10px auto;
    width:320px;
    border-radius:10px;
}

button{
    padding:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin-top:8px;
}

#shopBtn{
    position:fixed;
    top:15px;
    right:15px;
    font-size:24px;
    background:#2c2c44;
}

#shop{
    display:none;
}

.critText{
    position:absolute;
    color:orange;
    font-weight:bold;
    animation:fade 1s forwards;
    pointer-events:none;
}

@keyframes fade{
    0%{opacity:1; transform:translateY(0);}
    100%{opacity:0; transform:translateY(-30px);}
}
</style>
</head>

<body>

<button id="shopBtn">🛒</button>

<h1>🍎 Apple Clicker</h1>

<div id="apple">🍎</div>

<div class="panel">
    <div>Очки: <span id="score">0</span></div>
</div>

<div class="panel">
    <div>Магазин</div>
    <div id="shop">
        <button onclick="buySkin()">Купить белое яблоко (2500)</button>
    </div>
</div>

<script>
let score = 0;

let critUsed = 0;
let windowPoints = 0;

let skinBought = false;

const apple = document.getElementById("apple");
const scoreEl = document.getElementById("score");
const shop = document.getElementById("shop");

document.getElementById("shopBtn").onclick = () => {
    shop.style.display = (shop.style.display === "block") ? "none" : "block";
};

apple.onclick = (e) => {

    let gain = 1;
    let isCrit = false;

    // сброс окна 500 очков
    if(windowPoints >= 500){
        windowPoints = 0;
        critUsed = 0;
    }

    // крит (редко + максимум 3 раза)
    if(Math.random() < 0.03 && critUsed < 3){
        gain = 5;
        critUsed++;
        isCrit = true;
    }

    score += gain;
    windowPoints += gain;

    update();

    // уменьшение яблока
    apple.style.transform = "scale(0.85)";
    setTimeout(()=> apple.style.transform = "scale(1)", 80);

    // текст крита
    if(isCrit){
        let t = document.createElement("div");
        t.className = "critText";
        t.innerText = "КРИТ +" + gain;
        t.style.left = e.pageX + "px";
        t.style.top = e.pageY + "px";
        document.body.appendChild(t);
        setTimeout(()=>t.remove(),1000);
    }
};

function buySkin(){
    if(score >= 2500 && !skinBought){
        score -= 2500;
        skinBought = true;

        apple.innerText = "🍏";
        apple.style.filter = "brightness(1.8) grayscale(1)";
        update();
    }
}

function update(){
    scoreEl.textContent = score;
}

update();
</script>

</body>
</html>
