<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apple Clicker Ultra</title>
    <style>
        :root {
            --common: #ffffff;
            --rare: #2ecc71;
            --epic: #9b59b6;
            --mythic: #e74c3c;
            --legendary: #f1c40f;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #121212;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
            touch-action: manipulation;
        }

        /* Анимация цифр при клике */
        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-130px) scale(0.8); opacity: 0; }
        }
        .click-pop {
            position: absolute;
            font-weight: bold;
            font-size: 28px;
            pointer-events: none;
            animation: floatUp 0.7s ease-out forwards;
            z-index: 100;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
        }

        #ui-top {
            text-align: center;
            margin-bottom: 30px;
        }

        #score {
            font-size: 70px;
            font-weight: 900;
            display: block;
            color: #f1c40f;
            text-shadow: 0 0 20px rgba(241, 196, 15, 0.3);
        }

        #auto-info { color: #888; font-size: 16px; margin-top: 5px; }

        #apple {
            font-size: 160px;
            cursor: pointer;
            transition: transform 0.05s;
            filter: drop-shadow(0 0 30px rgba(255,255,255,0.05));
            margin: 20px 0;
        }
        #apple:active { transform: scale(0.8); }

        .open-shop-btn {
            background: #2c3e50;
            border: 2px solid #34495e;
            color: white;
            padding: 18px 40px;
            border-radius: 15px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        /* Окно магазина */
        #shop-overlay {
            position: fixed;
            bottom: -100%;
            left: 0;
            width: 100%;
            height: 85%;
            background: #1a1a1a;
            border-top: 5px solid #333;
            transition: bottom 0.4s cubic-bezier(0.17, 0.84, 0.44, 1);
            z-index: 200;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
            box-sizing: border-box;
        }

        #shop-overlay.open { bottom: 0; }

        .shop-header {
            display: flex;
            justify-content: space-between;
            width: 90%;
            align-items: center;
            margin-bottom: 25px;
        }

        .close-btn { 
            background: #e74c3c; 
            border: none; 
            color: white; 
            padding: 10px 25px; 
            border-radius: 10px; 
            font-weight: bold;
            cursor: pointer;
        }

        .shop-content {
            width: 100%;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            padding-bottom: 50px;
        }

        .category-group {
            width: 90%;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .category-title { 
            font-size: 22px; 
            font-weight: bold; 
            border-left: 5px solid; 
            padding-left: 15px;
        }

        .skins-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .card {
            background: #252525;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            border: 2px solid transparent;
            transition: 0.2s;
        }

        /* Классы редкости */
        .rarity-common { border-color: var(--common); color: var(--common); }
        .rarity-rare { border-color: var(--rare); color: var(--rare); }
        .rarity-epic { border-color: var(--epic); color: var(--epic); }
        .rarity-mythic { border-color: var(--mythic); color: var(--mythic); }
        .rarity-legendary { border-color: var(--legendary); color: var(--legendary); }

        .skin-icon { font-size: 55px; margin-bottom: 10px; display: block; }
        
        .buy-btn {
            background: white;
            color: black;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 8px;
            font-weight: bold;
            margin-top: 12px;
            cursor: pointer;
        }
        .buy-btn:disabled { background: #444; color: #777; cursor: not-allowed; }

        hr { width: 90%; border: 0; border-top: 1px solid #333; margin: 10px 0; }
    </style>
</head>
<body>

    <div id="ui-top">
        <span id="score">0</span>
        <div id="auto-info">Авто-клик: <span id="auto-val">0</span> / сек</div>
    </div>

    <div id="apple">🍎</div>

    <button class="open-shop-btn" onclick="toggleShop(true)">МАГАЗИН 🛒</button>

    <!-- Окно магазина -->
    <div id="shop-overlay">
        <div class="shop-header">
            <h2 style="margin:0">Магазин предметов</h2>
            <button class="close-btn" onclick="toggleShop(false)">ЗАКРЫТЬ</button>
        </div>

        <div class="shop-content">
            <!-- Секция прокачки -->
            <div class="category-group">
                <div class="category-title" style="color: #3498db; border-color: #3498db;">УЛУЧШЕНИЯ</div>
                <div class="skins-grid">
                    <div class="card" style="border-color: #3498db;">
                        <span style="font-size: 14px; color: #aaa;">Сила клика: <b id="click-pwr" style="color:white">1</b></span>
                        <button class="buy-btn" id="upg-click" onclick="buyUpgrade()">Улучшить: 15</button>
                    </div>
                    <div class="card" style="border-color: #3498db;">
                        <span style="font-size: 14px; color: #aaa;">Автокликер</span>
                        <button class="buy-btn" id="upg-auto" onclick="buyAuto()">Купить: 50</button>
                    </div>
                </div>
            </div>

            <hr>

            <!-- Здесь динамически появятся скины -->
            <div id="skins-container" style="width: 100%; display: flex; flex-direction: column; align-items: center; gap: 25px;"></div>
        </div>
    </div>

    <script>
        let score = 0;
        let clickPower = 1;
        let upgradeCost = 15;
        let autoClickers = 0;
        let autoCost = 50;
        let currentSkinIcon = '🍎';

        // Твой список скинов
        const skins = [
            // Обычные
            { id: 'c1', name: 'Большое', icon: '🍎', price: 1000, rarity: 'common' },
            { id: 'c2', name: 'Черное', icon: '🖤', price: 1250, rarity: 'common' },
            { id: 'c3', name: 'Зеленое', icon: '🍏', price: 1500, rarity: 'common' },
            // Редкие
            { id: 'r1', name: 'Желтое', icon: '🍋', price: 5000, rarity: 'rare' },
            { id: 'r2', name: 'Маленькое', icon: '🍒', price: 8000, rarity: 'rare' },
            // Эпические
            { id: 'e1', name: 'Матрица', icon: '📟', price: 20000, rarity: 'epic' },
            { id: 'e2', name: 'Ледяное', icon: '🧊', price: 35000, rarity: 'epic' },
            // Мифические
            { id: 'm1', name: 'Адское', icon: '🩸', price: 50000, rarity: 'mythic' },
            { id: 'm2', name: 'Горячее', icon: '🔥', price: 75000, rarity: 'mythic' },
            // Легендарные
            { id: 'l1', name: 'Банановое', icon: '🍌', price: 100000, rarity: 'legendary' },
            { id: 'l2', name: 'Золотое', icon: '🌟', price: 125000, rarity: 'legendary' }
        ];

        let ownedSkins = ['c1']; // Первое яблоко уже есть

        function toggleShop(open) {
            document.getElementById('shop-overlay').classList.toggle('open', open);
        }

        function updateUI() {
            document.getElementById('score').innerText = Math.floor(score);
            document.getElementById('auto-val').innerText = autoClickers;
            document.getElementById('click-pwr').innerText = clickPower;
            
            const btnClick = document.getElementById('upg-click');
            btnClick.innerText = `Улучшить: ${upgradeCost}`;
            btnClick.disabled = score < upgradeCost;
            
            const btnAuto = document.getElementById('upg-auto');
            btnAuto.innerText = `Купить: ${autoCost}`;
            btnAuto.disabled = score < autoCost;

            renderSkins();
        }

        function renderSkins() {
            const container = document.getElementById('skins-container');
            container.innerHTML = '';

            const categories = [
                { id: 'common', title: 'ОБЫЧНЫЕ (БЕЛЫЕ)', color: 'var(--common)' },
                { id: 'rare', title: 'РЕДКИЕ (ЗЕЛЕНЫЕ)', color: 'var(--rare)' },
                { id: 'epic', title: 'ЭПИЧЕСКИЕ (ФИОЛЕТОВЫЕ)', color: 'var(--epic)' },
                { id: 'mythic', title: 'МИФИЧЕСКИЕ (КРАСНЫЕ)', color: 'var(--mythic)' },
                { id: 'legendary', title: 'ЛЕГЕНДАРНЫЕ (ЖЕЛТЫЕ)', color: 'var(--legendary)' }
            ];

            categories.forEach(cat => {
                const catSkins = skins.filter(s => s.rarity === cat.id);
                
                const group = document.createElement('div');
                group.className = 'category-group';
                group.innerHTML = `<div class="category-title" style="color: ${cat.color}; border-color: ${cat.color}">${cat.title}</div>`;
                
                const grid = document.createElement('div');
                grid.className = 'skins-grid';
                
                catSkins.forEach(skin => {
                    const isOwned = ownedSkins.includes(skin.id);
                    const card = document.createElement('div');
                    card.className = `card rarity-${skin.rarity}`;
                    
                    let btnText = isOwned ? (currentSkinIcon === skin.icon ? 'НАДЕТО' : 'НАДЕТЬ') : `${skin.price}`;
                    
                    card.innerHTML = `
                        <span class="skin-icon">${skin.icon}</span>
                        <span style="font-size:13px; font-weight:bold">${skin.name}</span>
                        <button class="buy-btn" ${!isOwned && score < skin.price ? 'disabled' : ''} onclick="handleSkin('${skin.id}')">
                            ${btnText}
                        </button>
                    `;
                    grid.appendChild(card);
                });
                group.appendChild(grid);
                container.appendChild(group);
            });
        }

        function handleSkin(id) {
            const skin = skins.find(s => s.id === id);
            if (ownedSkins.includes(id)) {
                currentSkinIcon = skin.icon;
                document.getElementById('apple').innerText = currentSkinIcon;
            } else if (score >= skin.price) {
                score -= skin.price;
                ownedSkins.push(id);
                currentSkinIcon = skin.icon;
                document.getElementById('apple').innerText = currentSkinIcon;
            }
            updateUI();
        }

        // Клик мышкой/пальцем
        document.getElementById('apple').addEventListener('pointerdown', (e) => {
            score += clickPower;
            showPop(e);
            updateUI();
        });

        function showPop(e) {
            const pop = document.createElement('div');
            pop.className = 'click-pop';
            pop.innerText = `+${clickPower}`;
            pop.style.left = (e.clientX - 20) + 'px';
            pop.style.top = (e.clientY - 40) + 'px';
            
            // Если скин золотой, цифры тоже золотые
            if (currentSkinIcon === '🌟') pop.style.color = '#f1c40f';
            else if (currentSkinIcon === '🔥') pop.style.color = '#ff4500';
            else pop.style.color = '#2ecc71';

            document.body.appendChild(pop);
            setTimeout(() => pop.remove(), 700);
        }

        function buyUpgrade() {
            if (score >= upgradeCost) {
                score -= upgradeCost;
                if (clickPower >= 30) clickPower += 2;
                else clickPower += 1;
                upgradeCost = Math.round(upgradeCost * 1.8);
                updateUI();
            }
        }

        function buyAuto() {
            if (score >= autoCost) {
                score -= autoCost;
                autoClickers++;
                autoCost = Math.round(autoCost * 2.1);
                updateUI();
            }
        }

        // Цикл автокликера
        setInterval(() => {
            if (autoClickers > 0) {
                score += autoClickers;
                updateUI();
            }
        }, 1000);

        updateUI();
    </script>
</body>
</html>
