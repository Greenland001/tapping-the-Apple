<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apple Adventure 2D</title>
    <style>
        body { margin: 0; background: #87CEEB; overflow: hidden; font-family: sans-serif; touch-action: none; user-select: none; }
        canvas { display: block; }

        /* Интерфейс */
        #ui { position: absolute; top: 15px; left: 15px; color: #fff; text-shadow: 2px 2px #000; pointer-events: none; }
        
        /* Управление */
        #controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-between; padding: 0 30px; box-sizing: border-box; }
        
        .d-pad { display: flex; gap: 10px; }
        .btn { width: 70px; height: 70px; background: rgba(0,0,0,0.6); border: 3px solid #fff; border-radius: 15px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 24px; }
        .btn:active { background: rgba(255,255,255,0.4); }
        
        #jump-btn { width: 90px; height: 90px; border-radius: 50%; background: #e74c3c; border: 4px solid #c0392b; }
    </style>
</head>
<body>

    <div id="ui">
        <div style="font-size: 24px;">🍎 Яблоки: <span id="score">0</span></div>
        <div style="font-size: 20px; color: gold;">LVL: <span id="player-lvl">1</span></div>
    </div>

    <canvas id="game"></canvas>

    <div id="controls">
        <div class="d-pad">
            <div class="btn" id="left-btn">◀</div>
            <div class="btn" id="right-btn">▶</div>
        </div>
        <div class="btn" id="jump-btn">↑</div>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let score = 0;
        let gravity = 0.8;

        let player = {
            x: 50, y: canvas.height - 150, w: 40, h: 50,
            vx: 0, vy: 0,
            speed: 6, jumpPower: 16,
            grounded: false,
            lvl: 1, exp: 0, nextLvl: 3
        };

        // Платформы (Опущены ниже по твоей просьбе)
        let platforms = [
            // Первый этаж (земля)
            { x: 0, y: canvas.height - 80, w: 500, h: 80 },
            { x: 750, y: canvas.height - 80, w: 600, h: 80 },
            
            // Ступеньки
            { x: 550, y: canvas.height - 150, w: 120, h: 50 }, 
            { x: 350, y: canvas.height - 200, w: 120, h: 50 },

            // Второй этаж
            { x: 0, y: canvas.height - 350, w: 300, h: 25 },
            { x: 500, y: canvas.height - 350, w: 400, h: 25 },

            // Третий этаж
            { x: 300, y: canvas.height - 480, w: 200, h: 25 }
        ];

        let apples = [
            { x: 800, y: canvas.height - 130, collected: false },
            { x: 50, y: canvas.height - 400, collected: false },
            { x: 380, y: canvas.height - 530, collected: false }
        ];

        let keys = { left: false, right: false };

        // Обработчики кнопок
        document.getElementById('left-btn').ontouchstart = (e) => { e.preventDefault(); keys.left = true; };
        document.getElementById('left-btn').ontouchend = () => keys.left = false;
        document.getElementById('right-btn').ontouchstart = (e) => { e.preventDefault(); keys.right = true; };
        document.getElementById('right-btn').ontouchend = () => keys.right = false;
        
        document.getElementById('jump-btn').ontouchstart = (e) => {
            e.preventDefault();
            if (player.grounded) {
                player.vy = -player.jumpPower;
                player.grounded = false;
            }
        };

        function update() {
            if (keys.left) player.vx = -player.speed;
            else if (keys.right) player.vx = player.speed;
            else player.vx *= 0.8;

            player.vy += gravity;
            player.x += player.vx;
            player.y += player.vy;

            player.grounded = false;

            // Коллизии
            for (let p of platforms) {
                if (player.x < p.x + p.w && player.x + player.w > p.x &&
                    player.y < p.y + p.h && player.y + player.h > p.y) {
                    if (player.vy > 0 && player.y + player.h - player.vy <= p.y) {
                        player.y = p.y - player.h;
                        player.vy = 0;
                        player.grounded = true;
                    }
                }
            }

            // Сбор яблок и уровень
            apples.forEach(a => {
                if (!a.collected && player.x < a.x + 30 && player.x + player.w > a.x &&
                    player.y < a.y + 30 && player.y + player.h > a.y) {
                    a.collected = true;
                    score++;
                    player.exp++;
                    if (player.exp >= player.nextLvl) {
                        player.lvl++;
                        player.exp = 0;
                        player.nextLvl += 2;
                    }
                    document.getElementById('score').innerText = score;
                    document.getElementById('player-lvl').innerText = player.lvl;
                }
            });

            // Возрождение НА ЗЕМЛЕ при падении
            if (player.y > canvas.height) {
                player.x = 50; 
                player.y = canvas.height - 200; 
                player.vy = 0;
                player.vx = 0;
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Платформы
            for (let p of platforms) {
                ctx.fillStyle = "#2ecc71"; // Трава
                ctx.fillRect(p.x, p.y, p.w, 10);
                ctx.fillStyle = "#795548"; // Земля
                ctx.fillRect(p.x, p.y + 10, p.w, p.h - 10);
            }

            // Яблоки
            ctx.font = "30px Arial";
            apples.forEach(a => {
                if (!a.collected) ctx.fillText("🍎", a.x, a.y);
            });

            // Игрок
            ctx.fillStyle = "#fff";
            ctx.fillRect(player.x, player.y, player.w, player.h);
            ctx.fillStyle = "#333";
            ctx.fillRect(player.x + 25, player.y + 10, 8, 8); // Глаз

            update();
            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
