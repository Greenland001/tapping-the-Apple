<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dan the Man Style Platformer</title>
    <style>
        body { margin: 0; background: #87CEEB; overflow: hidden; font-family: 'Arial', sans-serif; touch-action: none; user-select: none; }
        canvas { display: block; }

        /* Интерфейс */
        #ui { position: absolute; top: 15px; left: 15px; color: #fff; text-shadow: 2px 2px #000; pointer-events: none; }
        
        /* Управление */
        #controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-between; padding: 0 30px; box-sizing: border-box; }
        
        .d-pad { display: grid; grid-template-columns: 60px 60px 60px; grid-template-rows: 60px 60px; }
        .btn { width: 60px; height: 60px; background: rgba(0,0,0,0.5); border: 2px solid #fff; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
        .btn:active { background: rgba(255,255,255,0.4); }
        
        #jump-btn { width: 80px; height: 80px; border-radius: 50%; background: #e74c3c; border: 4px solid #c0392b; font-size: 20px; }
    </style>
</head>
<body>

    <div id="ui">
        <div style="font-size: 24px;">🍎: <span id="score">0</span></div>
    </div>

    <canvas id="game"></canvas>

    <div id="controls">
        <!-- Крестик для ходьбы -->
        <div class="d-pad">
            <div style="grid-column: 1; grid-row: 2;" class="btn" id="left-btn">◀</div>
            <div style="grid-column: 3; grid-row: 2;" class="btn" id="right-btn">▶</div>
        </div>
        <!-- Кнопка прыжка -->
        <div class="btn" id="jump-btn">↑</div>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let score = 0;
        let gravity = 0.8;

        let player = {
            x: 100, y: 100, w: 40, h: 60,
            vx: 0, vy: 0,
            speed: 5, jumpPower: 15,
            grounded: false
        };

        // Платформы (земля)
        let platforms = [
            { x: 0, y: canvas.height - 100, w: 400, h: 100 },
            { x: 500, y: canvas.height - 200, w: 300, h: 40 },
            { x: 200, y: canvas.height - 350, w: 200, h: 40 },
            { x: 800, y: canvas.height - 150, w: 500, h: 150 }
        ];

        let apples = [
            { x: 550, y: canvas.height - 250, collected: false },
            { x: 250, y: canvas.height - 400, collected: false },
            { x: 900, y: canvas.height - 200, collected: false }
        ];

        // Управление
        let keys = { left: false, right: false };

        document.getElementById('left-btn').ontouchstart = () => keys.left = true;
        document.getElementById('left-btn').ontouchend = () => keys.left = false;
        document.getElementById('right-btn').ontouchstart = () => keys.right = true;
        document.getElementById('right-btn').ontouchend = () => keys.right = false;
        
        document.getElementById('jump-btn').ontouchstart = (e) => {
            e.preventDefault();
            if (player.grounded) {
                player.vy = -player.jumpPower;
                player.grounded = false;
            }
        };

        function update() {
            // Движение влево/вправо
            if (keys.left) player.vx = -player.speed;
            else if (keys.right) player.vx = player.speed;
            else player.vx *= 0.8; // Трение

            player.vy += gravity;
            player.x += player.vx;
            player.y += player.vy;

            player.grounded = false;

            // Коллизии с платформами
            for (let p of platforms) {
                if (player.x < p.x + p.w && player.x + player.w > p.x &&
                    player.y < p.y + p.h && player.y + player.h > p.y) {
                    
                    // Если падаем сверху на платформу
                    if (player.vy > 0 && player.y + player.h - player.vy <= p.y) {
                        player.y = p.y - player.h;
                        player.vy = 0;
                        player.grounded = true;
                    }
                }
            }

            // Сбор яблок
            apples.forEach(a => {
                if (!a.collected && player.x < a.x + 30 && player.x + player.w > a.x &&
                    player.y < a.y + 30 && player.y + player.h > a.y) {
                    a.collected = true;
                    score++;
                    document.getElementById('score').innerText = score;
                }
            });

            // Если упал в яму
            if (player.y > canvas.height) {
                player.x = 100; player.y = 100; player.vy = 0;
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Облака/фон (просто для красоты)
            ctx.fillStyle = "white";
            ctx.beginPath(); ctx.arc(100, 100, 40, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(140, 100, 30, 0, Math.PI*2); ctx.fill();

            // Отрисовка земли и платформ
            ctx.fillStyle = "#2ecc71"; // Трава
            for (let p of platforms) {
                ctx.fillRect(p.x, p.y, p.w, p.h);
                ctx.fillStyle = "#8e44ad"; // Земля под травой
                ctx.fillRect(p.x, p.y + 10, p.w, p.h - 10);
                ctx.fillStyle = "#2ecc71";
            }

            // Яблоки
            ctx.font = "30px Arial";
            apples.forEach(a => {
                if (!a.collected) ctx.fillText("🍎", a.x, a.y);
            });

            // Игрок (Персонаж как в Dan the Man)
            ctx.fillStyle = "#fff";
            ctx.fillRect(player.x, player.y, player.w, player.h); // Тело
            ctx.fillStyle = "#3498db"; 
            ctx.fillRect(player.x, player.y, player.w, 20); // Повязка ниндзя
            ctx.fillStyle = "#000";
            ctx.fillRect(player.x + 25, player.y + 5, 8, 8); // Глаза

            update();
            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
