<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apple Game + DEV</title>

<style>
html,body{
margin:0;
height:100%;
overflow:hidden;
font-family:Arial;
background:#151520;
color:white;
}

.game{
height:100%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
}

#apple{
font-size:120px;
cursor:pointer;
user-select:none;
transition:transform .1s;
filter:drop-shadow(0 10px 10px rgba(0,0,0,.5));
}

.panel{
background:#2c2c44;
padding:10px;
margin-top:10px;
width:300px;
border-radius:10px;
}

button{
padding:8px;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:6px;
width:100%;
}

/* SHOP */
#shopOverlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.85);
display:none;
align-items:center;
justify-content:center;
z-index:10;
}

.shopBox{
background:#2c2c44;
padding:20px;
border-radius:15px;
width:320px;
text-align:center;
}

.preview{
font-size:80px;
margin:10px 0;
}

/* CONFIRM */
#confirm{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.8);
display:none;
align-items:center;
justify-content:center;
z-index:20;
}

#confirmBox{
background:#2c2c44;
padding:20px;
border-radius:12px;
width:260px;
text-align:center;
}

/* SKINS */
.greenGlow{filter:drop-shadow(0 0 12px lime);}
.blackGlow{filter:drop-shadow(0 0 12px purple) brightness(.7);}
.goldGlow{filter:drop-shadow(0 0 15px gold) brightness(1.4);}

/* DEV PANEL */
#devPanel{
position:fixed;
bottom:10px;
left:10px;
background:#111;
padding:10px;
border-radius:10px;
display:none;
z-index:9999;
}

/* SECRET CORNER */
#secretCorner{
position:fixed;
top:0;
right:0;
width:20px;
height:20px;
opacity:0;
z-index:9999;
}

/* particles */
@keyframes floatUp{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-50px);opacity:0;}
}
</style>
</head>

<body>

<!-- СЕКРЕТНЫЙ УГОЛ -->
<div id="secretCorner"></div>

<div class="game">

<div id="apple">🍎</div>

<div class="panel">
<div>Очки: <span id="score">0</span></div>
<div>Урон: <span id="damage">1</span></div>
</div>

<div class="panel">
<div>Улучшение</div>
<div>Цена: <span id="cost">50</span></div>
<button onclick="upgradeDamage()">+1 урон</button>
</div>

</div>

<!-- SHOP -->
<div id="shopOverlay">
<div class="shopBox">
<h2>Магазин</h2>
<div id="preview" class="preview">🍎</div>

<button onclick="requestBuy('green')">🟢 1000</button>
<button onclick="requestBuy('black')">🌙 5000</button>
<button onclick="requestBuy('gold')">🥇 100000</button>

<button onclick="toggleShop()">Закрыть</button>
</div>
</div>

<!-- CONFIRM -->
<div id="confirm">
<div id="confirmBox">
<div id="confirmText"></div>
<button onclick="confirmBuy(true)">КУПИТЬ / НАДЕТЬ</button>
<button onclick="confirmBuy(false)">ОТМЕНА</button>
</div>
</div>

<!-- DEV -->
<div id="devPanel">
<div>DEV MENU</div>
<button onclick="devGiveScore()">+10000</button>
<button onclick="devUnlockAll()">Unlock all skins</button>
<button onclick="devSetSkin('green')">Green</button>
<button onclick="devSetSkin('black')">Black</button>
<button onclick="devSetSkin('gold')">Gold</button>
</div>

<script>

let score=0;
let damage=1;
let cost=50;

let currentSkin="white";
let pendingSkin=null;
let pendingPrice=0;

let owned={green:false,black:false,gold:false};

/* LOAD */
function load(){
let s=localStorage.getItem("score");
let d=localStorage.getItem("damage");
let c=localStorage.getItem("cost");
let sk=localStorage.getItem("skin");
let o=localStorage.getItem("owned");

if(s)score=+s;
if(d)damage=+d;
if(c)cost=+c;
if(sk)currentSkin=sk;
if(o)owned=JSON.parse(o);

applySkin(currentSkin);
}

/* SAVE */
function save(){
localStorage.setItem("score",score);
localStorage.setItem("damage",damage);
localStorage.setItem("cost",cost);
localStorage.setItem("skin",currentSkin);
localStorage.setItem("owned",JSON.stringify(owned));
}

/* UI */
function update(){
if(score<0)score=0;
if(damage<1)damage=1;

document.getElementById("score").textContent=score;
document.getElementById("damage").textContent=damage;
document.getElementById("cost").textContent=cost;
}

/* SKINS */
function applySkin(skin){

let apple=document.getElementById("apple");
let preview=document.getElementById("preview");

apple.className="";
preview.className="preview";

if(skin==="green"){
apple.innerText="🍏";
preview.innerText="🍏";
apple.classList.add("greenGlow");
preview.classList.add("greenGlow");
}

if(skin==="black"){
apple.innerText="🍎";
preview.innerText="🍎";
apple.classList.add("blackGlow");
preview.classList.add("blackGlow");
}

if(skin==="gold"){
apple.innerText="🍎";
preview.innerText="🍎";
apple.classList.add("goldGlow");
preview.classList.add("goldGlow");
}

if(skin==="white"){
apple.innerText="🍎";
preview.innerText="🍎";
}

currentSkin=skin;
save();
}

/* CLICK */
document.getElementById("apple").onclick=(e)=>{

score+=damage;

let t=document.createElement("div");
t.innerText="+"+damage;
t.style.position="absolute";
t.style.left=e.pageX+"px";
t.style.top=e.pageY+"px";
t.style.color="white";
t.style.animation="floatUp .5s forwards";

document.body.appendChild(t);
setTimeout(()=>t.remove(),500);

update();
save();
};

/* UPGRADE */
function upgradeDamage(){
if(score>=cost){
score-=cost;

if(damage>=30){
damage+=2;
cost=Math.floor(cost*1.8+50);
}else{
damage+=1;
cost=Math.floor(cost*1.4+20);
}

update();
save();
}
}

/* SHOP */
function toggleShop(){
document.getElementById("shopOverlay").style.display="none";
}

function requestBuy(type){

let prices={green:1000,black:5000,gold:100000};

pendingSkin=type;
pendingPrice=prices[type];

if(owned[type]){
confirmText.innerText="Надеть этот скин?";
document.getElementById("confirm").style.display="flex";
return;
}

if(score<pendingPrice){
alert("НЕ ХВАТАЕТ ОЧКОВ");
return;
}

confirmText.innerText="Купить за "+pendingPrice+"?";
document.getElementById("confirm").style.display="flex";
}

function confirmBuy(ok){

document.getElementById("confirm").style.display="none";
if(!ok)return;

if(owned[pendingSkin]){
applySkin(pendingSkin);
pendingSkin=null;
return;
}

score-=pendingPrice;
owned[pendingSkin]=true;
applySkin(pendingSkin);

pendingSkin=null;

update();
save();
}

/* DEV */
let devClicks=0;

document.getElementById("secretCorner").onclick=()=>{

devClicks++;

setTimeout(()=>devClicks=0,1500);

if(devClicks>=3){
document.getElementById("devPanel").style.display="block";
}
};

function devGiveScore(){
score+=10000;
update();
save();
}

function devUnlockAll(){
owned={green:true,black:true,gold:true};
save();
}

function devSetSkin(s){
applySkin(s);
}

/* START */
load();
update();

</script>

</body>
  </html>
