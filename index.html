<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apple Clicker Pro</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2c3e50;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            user-select: none;
            overflow: hidden;
            touch-action: manipulation;
        }

        #score-container {
            font-size: 52px;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        #apple {
            font-size: 160px;
            cursor: pointer;
            transition: transform 0.05s;
            -webkit-tap-highlight-color: transparent;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
        }

        #apple:active {
            transform: scale(0.85);
        }

        #shop {
            margin-top: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(5px);
            width: 300px;
            text-align: center;
        }

        .upgrade-btn {
            background-color: #e74c3c;
            border: none;
            color: white;
            padding: 12px;
            width: 100%;
            font-size: 16px;
            margin: 8px 0;
            cursor: pointer;
            border-radius: 10px;
            font-weight: bold;
            transition: 0.2s;
        }

        .upgrade-btn:hover:not(:disabled) {
            background-color: #c0392b;
        }

        .upgrade-btn:disabled {
            background-color: #7f8c8d;
            opacity: 0.6;
            cursor: not-allowed;
        }

        .stat-label {
            font-size: 14px;
            color: #bdc3c7;
            margin-bottom: 2px;
        }
    </style>
</head>
<body>

    <div id="score-container">🍎 <span id="score">0</span></div>
    <div class="stat-label">Авто-клик: <span id="autoValue">0</span>/сек</div>

    <div id="apple">🍎</div>

    <div id="shop">
        <div class="stat-label">Сила клика: <span id="clickPower">1</span></div>
        <button id="upgradeBtn" class="upgrade-btn">Улучшить клик</button>
        <div class="stat-label">Цена: <span id="upgradeCost">15</span></div>
        
        <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 15px 0;">

        <button id="autoBtn" class="upgrade-btn" style="background-color: #3498db;">Купить Автокликер</button>
        <div class="stat-label">Цена: <span id="autoCost">50</span></div>
    </div>

    <script>
        let score = 0;
        let clickPower = 1;
        let upgradeCost = 15;
        
        let autoClickers = 0;
        let autoCost = 50;

        const scoreDisplay = document.getElementById('score');
        const apple = document.getElementById('apple');
        
        const upgradeBtn = document.getElementById('upgradeBtn');
        const upgradeCostDisplay = document.getElementById('upgradeCost');
        const clickPowerDisplay = document.getElementById('clickPower');

        const autoBtn = document.getElementById('autoBtn');
        const autoCostDisplay = document.getElementById('autoCost');
        const autoValueDisplay = document.getElementById('autoValue');

        function updateDisplay() {
            scoreDisplay.innerText = Math.floor(score);
            
            // Кнопка силы клика
            clickPowerDisplay.innerText = clickPower;
            upgradeCostDisplay.innerText = upgradeCost;
            upgradeBtn.disabled = score < upgradeCost;

            // Кнопка автокликера
            autoCostDisplay.innerText = autoCost;
            autoValueDisplay.innerText = autoClickers;
            autoBtn.disabled = score < autoCost;
        }

        // Клик по яблоку
        apple.addEventListener('click', () => {
            score += clickPower;
            updateDisplay();
        });

        // Покупка силы клика
        upgradeBtn.addEventListener('click', () => {
            if (score >= upgradeCost) {
                score -= upgradeCost;
                
                // Логика: если сила 30 и выше, даем +2, иначе +1
                if (clickPower >= 30) {
                    clickPower += 2;
                } else {
                    clickPower += 1;
                }

                upgradeCost = Math.round(upgradeCost * 1.8);
                updateDisplay();
            }
        });

        // Покупка автокликера
        autoBtn.addEventListener('click', () => {
            if (score >= autoCost) {
                score -= autoCost;
                autoClickers += 1;
                autoCost = Math.round(autoCost * 2.1);
                updateDisplay();
            }
        });

        // Работа автокликера (раз в секунду)
        setInterval(() => {
            if (autoClickers > 0) {
                score += autoClickers;
                updateDisplay();
            }
        }, 1000);

        updateDisplay();
    </script>
</body>
</html>
