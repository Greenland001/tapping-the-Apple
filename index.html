<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Simple Apple Clicker</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #121212;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
            touch-action: manipulation;
        }

        /* Счетчик */
        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        #score {
            font-size: 60px;
            font-weight: bold;
            color: #ff4d4d;
            display: block;
        }

        .info {
            font-size: 14px;
            opacity: 0.7;
            margin-top: 5px;
        }

        /* Яблоко */
        #apple {
            font-size: 150px;
            cursor: pointer;
            transition: transform 0.1s;
            margin: 30px 0;
            display: inline-block;
        }

        #apple:active {
            transform: scale(0.9);
        }

        /* Кнопки улучшений */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 250px;
        }

        .btn {
            background-color: #1e1e1e;
            border: 2px solid #333;
            color: white;
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            text-align: left;
            transition: 0.2s;
        }

        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .btn b {
            display: block;
            font-size: 16px;
            margin-bottom: 4px;
        }

        .btn span {
            font-size: 12px;
            color: #ffcc00;
        }
    </style>
</head>
<body>

    <div class="header">
        <span id="score">0</span>
        <div class="info">
            Клик: <b id="val-click">1</b> | В сек: <b id="val-auto">0</b>
        </div>
    </div>

    <div id="apple">🍎</div>

    <div class="controls">
        <button class="btn" id="buy-click">
            <b>+1 к клику</b>
            <span>Цена: <i id="cost-click">15</i></span>
        </button>
        
        <button class="btn" id="buy-auto">
            <b>Автокликер (+1 сек)</b>
            <span>Цена: <i id="cost-auto">50</i></span>
        </button>
    </div>

    <script>
        // Данные игры
        let apples = 0;
        let power = 1;
        let auto = 0;
        let priceClick = 15;
        let priceAuto = 50;

        // Элементы
        const scoreEl = document.getElementById('score');
        const appleEl = document.getElementById('apple');
        const btnClick = document.getElementById('buy-click');
        const btnAuto = document.getElementById('buy-auto');

        const costClickEl = document.getElementById('cost-click');
        const costAutoEl = document.getElementById('cost-auto');
        const valClickEl = document.getElementById('val-click');
        const valAutoEl = document.getElementById('val-auto');

        // Функция обновления экрана
        function update() {
            scoreEl.innerText = Math.floor(apples);
            valClickEl.innerText = power;
            valAutoEl.innerText = auto;
            costClickEl.innerText = priceClick;
            costAutoEl.innerText = priceAuto;

            btnClick.disabled = apples < priceClick;
            btnAuto.disabled = apples < priceAuto;
            
            // Сохранение в память браузера
            localStorage.setItem('simple_apple_save', JSON.stringify({
                apples, power, auto, priceClick, priceAuto
            }));
        }

        // Клик по яблоку
        appleEl.onclick = () => {
            apples += power;
            update();
        };

        // Покупка силы клика
        btnClick.onclick = () => {
            if (apples >= priceClick) {
                apples -= priceClick;
                power += 1;
                priceClick = Math.round(priceClick * 1.5);
                update();
            }
        };

        // Покупка автокликера
        btnAuto.onclick = () => {
            if (apples >= priceAuto) {
                apples -= priceAuto;
                auto += 1;
                priceAuto = Math.round(priceAuto * 1.6);
                update();
            }
        };

        // Работа автокликера (раз в секунду)
        setInterval(() => {
            if (auto > 0) {
                apples += auto;
                update();
            }
        }, 1000);

        // Загрузка сохранения
        const saved = JSON.parse(localStorage.getItem('simple_apple_save'));
        if (saved) {
            apples = saved.apples;
            power = saved.power;
            auto = saved.auto;
            priceClick = saved.priceClick;
            priceAuto = saved.priceAuto;
        }

        update();
    </script>
</body>
</html>
