<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apple Clicker 3.0</title>

<style>
html,body{
margin:0;
height:100%;
overflow:hidden;
font-family:Arial;
background:#151520;
color:white;
}

.game{
height:100%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
}

#apple{
font-size:120px;
cursor:pointer;
user-select:none;
transition:transform .08s;
}

#apple:active{
transform:scale(0.92);
}

.panel{
background:#2c2c44;
padding:10px;
margin-top:10px;
width:300px;
border-radius:10px;
}

button{
padding:8px;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:6px;
width:100%;
}

/* SHOP */
#shop{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.85);
display:none;
align-items:center;
justify-content:center;
z-index:10;
}

.box{
background:#2c2c44;
padding:20px;
border-radius:15px;
width:320px;
text-align:center;
}

/* CONFIRM */
#confirm{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.8);
display:none;
align-items:center;
justify-content:center;
z-index:20;
}

#confirmBox{
background:#2c2c44;
padding:20px;
border-radius:12px;
width:260px;
}

/* SKINS */
.green{filter:drop-shadow(0 0 12px lime);}
.black{filter:drop-shadow(0 0 12px purple);}
.gold{filter:drop-shadow(0 0 15px gold);}

/* SECRET AREA */
#secret{
position:fixed;
top:0;
right:0;
width:30px;
height:30px;
opacity:0;
z-index:9999;
}

/* particles */
@keyframes floatUp{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-50px);opacity:0;}
}
</style>
</head>

<body>

<div id="secret"></div>

<div class="game">

<div id="apple">🍎</div>

<div class="panel">
Очки: <span id="score">0</span><br>
Урон: <span id="damage">1</span>
</div>

<div class="panel">
<div>Цена: <span id="cost">50</span></div>
<button onclick="upgrade()">+1 урон</button>
</div>

<div class="panel">
<button onclick="openShop()">🛒 Магазин</button>
</div>

</div>

<!-- SHOP -->
<div id="shop">
<div class="box">
<h2>Магазин</h2>

<button onclick="buy('green',1000)">🟢 1000</button>
<button onclick="buy('black',5000)">🌙 5000</button>
<button onclick="buy('gold',100000)">🥇 100000</button>

<button onclick="closeShop()">Закрыть</button>
</div>
</div>

<!-- CONFIRM -->
<div id="confirm">
<div id="confirmBox">
<div id="text"></div>
<button onclick="yes()">ДА</button>
<button onclick="no()">НЕТ</button>
</div>
</div>

<script>

let score=0;
let damage=1;
let cost=50;

let owned={green:false,black:false,gold:false};
let current=null;

let pending=null;
let price=0;

/* SAVE */
function save(){
localStorage.setItem("s",score);
localStorage.setItem("d",damage);
localStorage.setItem("c",cost);
localStorage.setItem("o",JSON.stringify(owned));
}

/* LOAD */
function load(){
let s=localStorage.getItem("s");
let d=localStorage.getItem("d");
let c=localStorage.getItem("c");
let o=localStorage.getItem("o");

if(s)score=+s;
if(d)damage=+d;
if(c)cost=+c;
if(o)owned=JSON.parse(o);

update();
}

/* UPDATE */
function update(){
document.getElementById("score").textContent=score;
document.getElementById("damage").textContent=damage;
document.getElementById("cost").textContent=cost;
}

/* CLICK */
document.getElementById("apple").addEventListener("click",(e)=>{

score+=damage;

let t=document.createElement("div");
t.innerText="+"+damage;
t.style.position="absolute";
t.style.left=e.pageX+"px";
t.style.top=e.pageY+"px";
t.style.color="white";
t.style.animation="floatUp .5s forwards";

document.body.appendChild(t);
setTimeout(()=>t.remove(),500);

update();
save();
});

/* UPGRADE */
function upgrade(){
if(score>=cost){
score-=cost;

if(damage>=30){
damage+=2;
cost=Math.floor(cost*1.8+50);
}else{
damage+=1;
cost=Math.floor(cost*1.4+20);
}

update();
save();
}
}

/* SHOP */
function openShop(){
document.getElementById("shop").style.display="flex";
}
function closeShop(){
document.getElementById("shop").style.display="none";
}

/* BUY */
function buy(type,p){

pending=type;
price=p;

if(owned[type]){
document.getElementById("text").innerText="Надеть скин?";
document.getElementById("confirm").style.display="flex";
return;
}

if(score<p){
alert("НЕ ХВАТАЕТ ОЧКОВ");
return;
}

document.getElementById("text").innerText="Купить?";
document.getElementById("confirm").style.display="flex";
}

function yes(){
document.getElementById("confirm").style.display="none";

if(owned[pending]){
apply(pending);
return;
}

score-=price;
owned[pending]=true;
apply(pending);

save();
update();
}

function no(){
document.getElementById("confirm").style.display="none";
}

/* SKIN */
function apply(s){
let a=document.getElementById("apple");
a.className="";

if(s==="green")a.innerText="🍏",a.classList.add("green");
if(s==="black")a.innerText="🍎",a.classList.add("black");
if(s==="gold")a.innerText="🍎",a.classList.add("gold");

current=s;
save();
}

/* DEV */
let c1=0;
let c2=0;

document.getElementById("apple").addEventListener("click",()=>{
c1++;
setTimeout(()=>c1=0,1500);
});

document.getElementById("secret").addEventListener("click",()=>{
c2++;
setTimeout(()=>c2=0,1500);

if(c1>=3 && c2>=2){
alert("DEV ON");
score+=10000;
owned={green:true,black:true,gold:true};
update();
save();
}
});

load();
update();

</script>

</body>
</html>
