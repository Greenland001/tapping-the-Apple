<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apple Clicker 4.0</title>

<style>
html,body{
margin:0;
height:100%;
overflow:hidden;
font-family:Arial;
background:#151520;
color:white;
}
*{
user-select:none;
-webkit-user-select:none;
-ms-user-select:none;
}
.game{
height:100%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
}

#apple{
font-size:120px;
cursor:pointer;
user-select:none;
transition:transform .08s;
}

#apple:active{transform:scale(0.92);}

.panel{
background:#2c2c44;
padding:10px;
margin-top:10px;
width:300px;
border-radius:10px;
}

button{
padding:8px;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:6px;
width:100%;
}

/* SHOP */
#shop{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#111;
padding:10px;
display:none;
z-index:10;
}

.shopBox{
max-width:450px;
margin:auto;
background:#2c2c44;
padding:10px;
border-radius:10px;
text-align:center;
}

/* RARITY BAR */
.rarityBar{
display:flex;
justify-content:space-between;
font-size:12px;
margin-bottom:10px;
padding:5px;
border-radius:8px;
background:#1a1a2a;
}

.r1{color:#ccc;}
.r2{color:lime;}
.r3{color:#4da3ff;}
.r4{color:red;}
.r5{color:gold;}

/* SHOP GRID */
.skinGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.skinCard{
background:#1f1f33;
padding:10px;
border-radius:12px;
cursor:pointer;
transition:0.2s;
user-select:none;
}

.skinCard:hover{
transform:scale(1.05);
}

/* SKINS */
.green{color:lime;}
.blue{color:#4da3ff;}
.dark{color:#333;}
.white{color:white;}
.banana{color:#ffd84d;}
.demon{color:red;text-shadow:0 0 8px red;}
.gold{color:gold;}

</style>
</head>

<body>

<div class="game">

<div id="apple">🍎</div>

<div class="panel">
Очки: <span id="score">0</span><br>
Урон: <span id="damage">1</span>
</div>

<div class="panel">
<b>Улучшение клика</b><br>
Цена: <span id="cost">50</span><br>
<button onclick="upgrade()">+1 урон</button>
</div>

<div class="panel">
<button onclick="openShop()">🛒 Магазин</button>
</div>

</div>

<!-- SHOP -->
<div id="shop">
<div class="shopBox">

<div class="rarityBar">
<span class="r1">Обычный</span>
<span class="r2">Редкий</span>
<span class="r3">Сверхредкий</span>
<span class="r4">Мифический</span>
<span class="r5">Легендарный</span>
</div>

<div class="skinGrid">

<div class="skinCard" onclick="buy('green',1000)">🟢 Зелёный</div>
<div class="skinCard" onclick="buy('blue',2000)">🔵 Синий</div>

<div class="skinCard" onclick="buy('dark',5000)">⚫ Тёмный</div>
<div class="skinCard" onclick="buy('white',5000)">⚪ Белый</div>

<div class="skinCard" onclick="buy('banana',15000)">🍌 Банановый</div>

<div class="skinCard" onclick="buy('demon',50000)">🔥 Адский</div>

<div class="skinCard" onclick="buy('gold',100000)">🥇 Золотой</div>

</div>

<button onclick="closeShop()">Закрыть</button>

</div>
</div>

<script>

let score=0;
let damage=1;
let cost=50;

let owned={
green:false,blue:false,dark:false,white:false,banana:false,demon:false,gold:false
};

let current="green";

/* SAVE */
function save(){
localStorage.setItem("score",score);
localStorage.setItem("damage",damage);
localStorage.setItem("cost",cost);
localStorage.setItem("owned",JSON.stringify(owned));
localStorage.setItem("current",current);
}

/* LOAD */
function load(){

let s=localStorage.getItem("score");
let d=localStorage.getItem("damage");
let c=localStorage.getItem("cost");
let o=localStorage.getItem("owned");
let cur=localStorage.getItem("current");

if(s!==null)score=+s;
if(d!==null)damage=+d;
if(c!==null)cost=+c;
if(o!==null)owned=JSON.parse(o);
if(cur!==null)current=cur;

apply(current);
update();
}

/* UPDATE */
function update(){
document.getElementById("score").textContent=score;
document.getElementById("damage").textContent=damage;
document.getElementById("cost").textContent=cost;
}

/* CLICK */
document.getElementById("apple").onclick=()=>{

score+=damage;
update();
save();
};

/* UPGRADE */
function upgrade(){
if(score>=cost){
score-=cost;

if(damage>=30){
damage+=2;
cost=Math.floor(cost*1.8+50);
}else{
damage+=1;
cost=Math.floor(cost*1.4+20);
}

update();
save();
}
}

/* SHOP */
function openShop(){
document.getElementById("shop").style.display="block";
}
function closeShop(){
document.getElementById("shop").style.display="none";
}

/* BUY */
function buy(type,p){

if(owned[type]){
apply(type);
return;
}

if(score<p){
alert("НЕ ХВАТАЕТ ОЧКОВ");
return;
}

score-=p;
owned[type]=true;
apply(type);

update();
save();
}

/* SKINS */
function apply(s){

let a=document.getElementById("apple");

a.className="";

if(s==="green"){a.innerText="🍏";a.classList.add("green");}
if(s==="blue"){a.innerText="🍎";a.classList.add("blue");}
if(s==="dark"){a.innerText="🍎";a.classList.add("dark");}
if(s==="white"){a.innerText="🍎";a.classList.add("white");}
if(s==="banana"){a.innerText="🍌";a.classList.add("banana");}
if(s==="demon"){a.innerText="🍎";a.classList.add("demon");}
if(s==="gold"){a.innerText="🍎";a.classList.add("gold");}

current=s;
save();
}

load();
update();

</script>

</body>
</html>
